<meta property="og:description" content="실시간 차트 배틀 · 실데이터 롱/숏 예측 · 랭킹·꾸미기. 교육용 모의 트레이딩 게임(가상 재화, 환전 불가).">

<title>차트아레나 — 차트배틀 (가로 퀴즈쇼)</title>
<style>
  :root{
    --gold:#E9B949; --gold2:#F6D272; --green:#35D07A; --pink:#FF5C8A; --blue:#4CA9FF; --up:#F0616D; --down:#4C8DF6;
    --sans:"Segoe UI",-apple-system,"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    --mono:"Cascadia Mono",ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0; background:#05060d; color:#EAF0FA; font-family:var(--sans); min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; overflow:hidden}
  .cap{max-width:560px; text-align:center; margin-bottom:10px}
  .cap .k{font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:#8A6D2B; font-weight:700}
  .cap h1{margin:.3em 0 .1em; font-size:20px; font-weight:800}
  .cap p{margin:0; color:#93A0BC; font-size:12.5px; line-height:1.55}
  .rotate{margin-top:8px; font-size:11px; color:#5A6478}

  .scaler{transform-origin:top center}
  /* 가로 스튜디오 무대 (고정 크기 → JS로 화면폭에 맞춰 스케일) */
  .frame{position:relative; width:1120px; height:516px; border-radius:22px; overflow:hidden;
    background:radial-gradient(120% 80% at 50% -10%, #1b3a6b 0%, #0c1a35 45%, #060d1e 100%);
    box-shadow:0 30px 70px -20px #000, 0 0 0 1px rgba(255,255,255,.05) inset}
  /* 스포트라이트 */
  .spot{position:absolute; top:-40px; width:150px; height:340px; pointer-events:none; opacity:.5;
    background:radial-gradient(closest-side at 50% 0,rgba(120,180,255,.5),transparent 75%); filter:blur(4px); transform:skewX(0)}
  .spot.s1{left:6%} .spot.s2{left:30%} .spot.s3{left:62%} .spot.s4{right:6%}

  .top{position:relative; z-index:2; display:flex; align-items:center; gap:12px; padding:10px 22px}
  .logo{font-weight:900; font-size:20px; letter-spacing:.3px}
  .logo .g{color:var(--gold)}
  .live{font-size:11px; font-weight:900; color:#fff; background:#e5484d; padding:3px 9px; border-radius:6px; box-shadow:0 0 12px rgba(229,72,77,.6); animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.55}}
  .round{margin-left:auto; font-family:var(--mono); font-weight:800; color:var(--gold); font-size:15px}
  .bbal{font-family:var(--mono); font-weight:900; color:#FCE9A6; font-size:14px; background:rgba(233,185,73,.14); border:1px solid rgba(233,185,73,.4); border-radius:999px; padding:4px 12px}
  .endbtn{margin-left:12px; background:#123; border:1px solid #2a4b7a; color:#9fc3ff; font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer}

  /* TV 스크린(차트) */
  .tv{position:relative; z-index:1; margin:2px auto 0; width:900px; height:232px; border-radius:14px; padding:9px;
    background:linear-gradient(180deg,#0c2244,#08152b); border:2px solid #2f5c9e;
    box-shadow:0 0 26px -4px rgba(76,169,255,.5), 0 0 0 4px rgba(0,0,0,.3) inset}
  #chart{width:100%; height:100%; display:block; border-radius:8px; background:#050c1c}
  .tvtag{position:absolute; left:16px; top:16px; font-size:11px; color:#7fb0ff; font-family:var(--mono)}
  .indbar{position:absolute; left:14px; top:34px; z-index:3; display:flex; gap:5px}
  .ind{font-size:10px; font-weight:800; padding:3px 8px; border-radius:999px; background:rgba(8,18,38,.78); border:1px solid #2a4b7a; color:#7d8bab; cursor:pointer; user-select:none; line-height:1.3}
  .ind.on{color:#06121f; background:#4CC3FF; border-color:#4CC3FF}
  .timer{position:absolute; right:16px; top:12px; text-align:center}
  .timer .n{font-family:var(--mono); font-weight:900; font-size:30px; line-height:1; color:var(--gold); text-shadow:0 0 12px rgba(233,185,73,.6)}
  .timer .b{width:88px; height:6px; margin-top:4px; border-radius:3px; background:#0a1a33; overflow:hidden}
  .timer .b i{display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--gold)); width:100%}
  .verdict{position:absolute; left:50%; top:46%; transform:translate(-50%,-50%) scale(.7); opacity:0; transition:all .3s; text-align:center;
    background:rgba(6,12,26,.9); border:1px solid rgba(233,185,73,.5); border-radius:16px; padding:12px 22px; z-index:3; box-shadow:0 12px 40px -10px #000; white-space:nowrap}
  .verdict.show{opacity:1; transform:translate(-50%,-50%) scale(1)}
  .verdict .mv{font-weight:900; font-size:32px; line-height:1.05; text-shadow:0 2px 14px #000}
  .verdict .pl{font-weight:800; font-size:16px; color:#EAF0FA; margin-top:6px}
  .verdict .bl{font-family:var(--mono); font-size:12.5px; color:#93A0BC; margin-top:3px}
  .verdict .bl b{color:#FCE9A6}

  /* 단상 4개 */
  .podiums{position:absolute; left:0; right:0; bottom:80px; z-index:2; display:flex; justify-content:center; gap:20px; padding:0 22px}
  .pod{width:218px; text-align:center; position:relative}
  .pod .ava{display:flex; align-items:flex-end; justify-content:center; position:relative; z-index:3; margin-bottom:-16px}
  .pod .ava .ch{height:140px; object-fit:contain; filter:drop-shadow(0 10px 10px rgba(0,0,0,.5))}
  .pod .ava .em{font-size:104px; line-height:1; filter:drop-shadow(0 10px 10px rgba(0,0,0,.5))}
  .pod .pick{position:absolute; top:2px; left:50%; transform:translateX(-50%); z-index:6; font-size:13px; font-weight:900; padding:2px 10px; border-radius:999px; opacity:0; transition:all .2s}
  .pod .pick.on{opacity:1}
  .pick.L{background:rgba(53,208,122,.22); color:var(--green); border:1px solid var(--green)}
  .pick.S{background:rgba(255,92,138,.22); color:var(--pink); border:1px solid var(--pink)}
  .pick.W{background:rgba(233,185,73,.22); color:var(--gold); border:1px solid var(--gold)}
  .pick.Q{background:#0a1a33; color:#5a7099; border:1px solid #24406e}
  .desk{margin-top:2px; border-radius:10px 10px 6px 6px; padding:6px 6px 7px; background:linear-gradient(180deg,#16305a,#0b1c38); border:1px solid #2a4b7a; position:relative}
  .desk.me{border-color:var(--gold); box-shadow:0 0 18px -4px rgba(233,185,73,.5)}
  .desk .nm{font-size:12px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .desk .led{margin-top:4px; background:#020814; border:1px solid #0d1f3a; border-radius:6px; padding:3px 0;
    font-family:var(--mono); font-weight:900; font-size:18px; color:var(--green); text-shadow:0 0 8px rgba(53,208,122,.7); letter-spacing:1px}
  .desk .delta{position:absolute; right:6px; top:-14px; font-family:var(--mono); font-weight:900; font-size:14px; opacity:0; transition:all .5s}
  .desk .crown{position:absolute; left:50%; top:-30px; transform:translateX(-50%); font-size:18px; opacity:0}
  .desk.lead .crown{opacity:1}

  /* 하단 컨트롤 (내 선택) */
  .ctrl{position:absolute; left:0; right:0; bottom:0; z-index:4; height:74px; display:flex; align-items:center; gap:13px; padding:0 16px;
    background:linear-gradient(0deg,rgba(6,12,26,.96),rgba(6,12,26,.55)); border-top:1px solid #1a2c4e}
  .ctrl .lab{font-size:12px; color:#93A0BC; font-weight:700; margin-right:2px}
  .cgrp{display:flex; align-items:center; gap:5px}
  .clab{font-size:10px; color:#7d8bab; font-weight:800; letter-spacing:.02em}
  .dir{flex:0 0 auto; width:86px; text-align:center; padding:7px 4px; border-radius:11px; cursor:pointer; border:2px solid transparent; background:#0e1c38; font-weight:900; font-size:14px}
  .dir small{display:block; font-size:9px; font-weight:400; opacity:.75}
  .bets{display:flex; gap:4px}
  .bet{padding:8px 9px; border-radius:9px; background:#0e1c38; border:1px solid #2c4a35; color:#9fe3bb; font-weight:800; font-size:12px; cursor:pointer; min-width:36px; text-align:center}
  .bet.on{background:linear-gradient(180deg,#8fe3b0,#35D07A); color:#06301c; border-color:transparent}
  .dir.long{color:var(--green)} .dir.long.on{background:rgba(53,208,122,.2); border-color:var(--green); box-shadow:0 0 16px -3px rgba(53,208,122,.6)}
  .dir.short{color:var(--pink)} .dir.short.on{background:rgba(255,92,138,.2); border-color:var(--pink); box-shadow:0 0 16px -3px rgba(255,92,138,.6)}
  .dir.watch{color:var(--gold)} .dir.watch.on{background:rgba(233,185,73,.2); border-color:var(--gold); box-shadow:0 0 16px -3px rgba(233,185,73,.6)}
  .levs{display:flex; gap:4px}
  .lev{padding:8px 9px; border-radius:9px; background:#0e1c38; border:1px solid #24406e; color:#9fc3ff; font-weight:800; font-size:12px; cursor:pointer; min-width:32px; text-align:center}
  .lev.on{background:linear-gradient(180deg,var(--gold2),var(--gold)); color:#3a2c07; border-color:transparent}
  .go{margin-left:auto; border:none; cursor:pointer; font-family:inherit; color:#3a2c07; font-weight:900; font-size:13.5px; padding:10px 16px; border-radius:12px; white-space:nowrap;
    background:linear-gradient(180deg,#FCE9A6,#F6D272 45%,#D8A63A); box-shadow:0 6px 18px -4px rgba(233,185,73,.6)}
  .go.next{background:linear-gradient(180deg,#8fd6ff,#4CA9FF); color:#04223f}
  .go:disabled{background:#1a2c4e; color:#5a7099; box-shadow:none; cursor:default}
  .msg{position:absolute; left:50%; bottom:100px; transform:translateX(-50%); z-index:5; background:rgba(6,12,26,.95); border:1px solid var(--gold);
    color:var(--gold); font-weight:800; font-size:13px; padding:8px 16px; border-radius:10px; opacity:0; transition:.2s; pointer-events:none}
  .msg.show{opacity:1}
  @media (prefers-reduced-motion: reduce){ .live{animation:none} }
  .blogo{height:38px;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  #splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(closest-side at 50% 44%,#0f1c39,#05070f 82%);transition:opacity .5s ease}
  #splash img{max-width:min(74%,820px);max-height:68%;object-fit:contain;filter:drop-shadow(0 24px 60px rgba(0,0,0,.75));animation:splashPop .85s cubic-bezier(.2,.8,.2,1) both}
  #splash.out{opacity:0;pointer-events:none}
  @keyframes splashPop{0%{transform:scale(.82);opacity:0}55%{opacity:1}100%{transform:scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){#splash img{animation:none}}
  /* 실제 차트 정답 공개 배지 */
  .chartid{position:absolute; left:50%; top:12px; transform:translate(-50%,-10px); z-index:4; opacity:0; transition:.4s cubic-bezier(.2,.8,.2,1);
    background:rgba(6,12,26,.94); border:1px solid var(--gold); border-radius:999px; padding:6px 15px; font-size:13px; font-weight:800; color:#EAF0FA; white-space:nowrap; pointer-events:none; box-shadow:0 6px 20px -6px rgba(0,0,0,.8)}
  .chartid.show{opacity:1; transform:translate(-50%,0)}
  .chartid b{color:var(--gold)}
  .chartid .rl{color:#35D07A; font-weight:700; font-size:11px; margin-left:7px}
  /* 이모티콘 */
  .emobar{position:absolute; left:16px; bottom:84px; z-index:7}
  .emobtn{width:44px; height:44px; border-radius:50%; border:1px solid var(--gold); background:rgba(6,12,26,.92); font-size:22px; cursor:pointer; box-shadow:0 4px 14px -4px rgba(0,0,0,.7)}
  .emobtn:hover{background:rgba(233,185,73,.18)}
  .emopop{position:absolute; left:0; bottom:52px; display:none; grid-template-columns:repeat(5,1fr); gap:3px; width:236px;
    background:rgba(6,12,26,.97); border:1px solid var(--gold); border-radius:14px; padding:8px; box-shadow:0 10px 30px -8px rgba(0,0,0,.85)}
  .emopop.on{display:grid}
  .emopop span{font-size:24px; cursor:pointer; text-align:center; padding:5px 0; border-radius:8px; transition:.12s}
  .emopop span:hover{background:rgba(233,185,73,.22); transform:scale(1.15)}
  .pod .emote{position:absolute; left:50%; bottom:64px; transform:translateX(-50%); font-size:32px; pointer-events:none; z-index:9;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.6)); animation:emoteFloat 1.7s ease-out forwards}
  @keyframes emoteFloat{0%{opacity:0; transform:translate(-50%,10px) scale(.5)} 16%{opacity:1; transform:translate(-50%,-4px) scale(1.2)} 34%{transform:translate(-50%,-14px) scale(1)} 100%{opacity:0; transform:translate(-50%,-58px) scale(.85)}}
  .bshare{position:absolute;left:50%;bottom:86px;transform:translateX(-50%);z-index:6;display:none;border:1px solid var(--gold);background:rgba(6,12,26,.94);color:var(--gold);font-family:inherit;font-weight:800;font-size:13px;padding:9px 16px;border-radius:12px;cursor:pointer;box-shadow:0 6px 18px -6px rgba(0,0,0,.7)}
  .bshare:active{transform:translateX(-50%) translateY(1px)}
</style>

<div class="scaler" id="scaler">
<div class="frame">
  <div class="spot s1"></div><div class="spot s2"></div><div class="spot s3"></div><div class="spot s4"></div>

  <div class="top">
    <img class="blogo" src="assets/logo_wordmark.png" alt="차트아레나">
    <span class="live">● LIVE</span>
    <span class="round" id="round">ROUND 1 / 10</span>
    <span class="bbal" id="bbal">💰 0</span>
    <button class="endbtn" type="button" id="endbtn">종료</button>
  </div>

  <div class="tv">
    <canvas id="chart"></canvas>
    <div class="tvtag" id="tvtag">난이도 ◆◆◆◆◇</div>
    <div class="indbar" id="indbar">
      <div class="ind on" data-ind="ma">이평선</div>
      <div class="ind" data-ind="boll">볼린저</div>
      <div class="ind" data-ind="ichi">일목</div>
    </div>
    <div class="timer"><div class="n" id="tnum">15</div><div class="b"><i id="tbar"></i></div></div>
    <div class="verdict" id="verdict"></div>
    <div class="chartid" id="chartid"></div>
  </div>

  <div class="podiums" id="podiums"></div>

  <div class="ctrl">
    <div class="cgrp"><span class="clab">방향</span>
      <div class="dir long" data-dir="L" id="dL">↗ 롱<small>상승</small></div>
      <div class="dir short" data-dir="S" id="dS">↘ 숏<small>하락</small></div>
      <div class="dir watch" data-dir="W" id="dW">◎ 관망<small>안 검</small></div>
    </div>
    <div class="cgrp"><span class="clab">배팅</span><div class="bets" id="bets"></div></div>
    <div class="cgrp"><span class="clab">배율</span><div class="levs" id="levs"></div></div>

  </div>
  <div class="msg" id="msg"></div>
  <button class="bshare" id="bShare" type="button">📸 인증짤 만들기</button>
  <div class="emobar" id="emobar"><button class="emobtn" id="emobtn" type="button" title="이모티콘">😀</button><div class="emopop" id="emopop"></div></div>
</div>
</div>

<script src="charts.js"></script>
<script>
(function(){
"use strict";
var $=function(id){return document.getElementById(id);};
var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
/* 인트로 스플래시 (세션당 1회) */
(function(){var s=$('splash');if(!s)return;var seen;try{seen=sessionStorage.getItem('ca_splash_b');}catch(e){}
  if(seen){if(s.parentNode)s.parentNode.removeChild(s);return;}
  try{sessionStorage.setItem('ca_splash_b','1');}catch(e){}
  setTimeout(function(){s.classList.add('out');setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},520);},reduce?500:1300);})();

/* 허브(차고)에서 장착한 캐릭터·닉네임 공유 */
var CHIMG={shark:'assets/char_shark.png',bull:'assets/char_bull.png',bear:'assets/char_bear.png',tiger:'assets/char_tiger.png',dragon:'assets/char_dragon.png',king:'assets/char_king.png'};
for(var _pi=0;_pi<45;_pi++)CHIMG['pet'+_pi]='assets/pet'+_pi+'.png';
for(var _hi=0;_hi<17;_hi++)CHIMG['hu'+_hi]='assets/hu'+_hi+'.png?v=4';
var hub={}; try{hub=JSON.parse(localStorage.getItem('chartarena_hub_v1'))||{};}catch(e){}
var myCh=(hub.equip&&hub.equip.ch)||'shark', myNick=hub.nick||'차트고수';
/* 보유 포인트(전 앱 공유) — 배팅/배당에 실제로 사용 */
var GS='chartarena_web_v1';
function ljg(k){try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return{};}}
function getBal(){var g=ljg(GS);return typeof g.balance==='number'?g.balance:25000;}
function setBal(v){var g=ljg(GS);g.balance=Math.max(0,Math.round(v));localStorage.setItem(GS,JSON.stringify(g));}
/* 재기(올인 파산) 보상 — 하루 5회까지 각 1,000P */
var DK='chartarena_daily_v1';
function _today(){ var d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function dget(){ var o=ljg(DK); if(o.d!==_today()){ o={d:_today(),att:0,allin:0,streak:o.streak||0,lastAtt:o.lastAtt||''}; localStorage.setItem(DK,JSON.stringify(o)); } return o; }
function comeback(){ var d=dget(); if(d.allin<5){ d.allin++; localStorage.setItem(DK,JSON.stringify(d)); setBal(1000); return d.allin; } return 0; }
function fmtP(n){return Math.round(n).toLocaleString();}
/* 배팅액 = 보유 포인트의 비율 (포커·맞고처럼 스택 일부를 건다) */
var BETPCTS=[[0.1,'10%'],[0.25,'25%'],[0.5,'50%'],[1,'올인']];
var roundBet=0;
function curBet(){ if(mySel&&mySel.dir==='W')return 0; return Math.max(0,Math.round(getBal()*((mySel&&mySel.betPct)||0.25))); }

/* 화면폭에 맞춰 가로 무대 스케일 */
function fit(){ var s=Math.min(1,(window.innerWidth-16)/1120,(window.innerHeight-16)/516); var sc=$('scaler');
  sc.style.transform='scale('+s+')'; sc.style.height=(516*s)+'px'; sc.style.width='1120px'; }
window.addEventListener('resize',fit); fit();

/* 플레이어 (나 + 봇3) */
var players=[
  {name:myNick, chImg:CHIMG[myCh]||CHIMG.shark, score:0, strat:'me', pick:null, lev:2, dp:0},
  {name:'핑크빈', em:'🐷', score:0, strat:'trend', pick:null, lev:2, dp:0},
  {name:'슬라임', em:'🟢', score:0, strat:'counter', pick:null, lev:1, dp:0},
  {name:'주황버섯', em:'🍄', score:0, strat:'random', pick:null, lev:3, dp:0},
];
/* AI 상대 = 랜덤 인간 캐릭터 + 랜덤 닉네임 (매 입장마다 랜덤 등장) */
var BOTNAMES=['불꽃트레이더','존버킴','떡상요정','캔들마스터','코인고수','한강뷰맨','우상향러','물타기왕','단타여신','칼손절','추격매수','다이아손','고래잡이','풀매수러','익절만렙','반등각','평단내리기','로켓탑승','바닥줍줍','패닉셀러','스캘핑고수','존버여왕','불장러','추매요정','시드지킴','청산방지','매수각','존버박','겁쟁이킴','한탕주의'];
(function randomizeBots(){
  function shuf(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;} return a; }
  var huPool=[]; for(var i=0;i<17;i++){ if('hu'+i!==myCh) huPool.push('hu'+i); }
  shuf(huPool); var nm=shuf(BOTNAMES.slice());
  for(var b=1;b<=3;b++){ players[b].chImg=CHIMG[huPool[b-1]]; players[b].name=nm[b-1]; delete players[b].em; }
})();
var ROUNDS=10, round=1, phase='pick', tleft=15, tmr=null, GD=null, gRev=48, revTimer=null, mySel={dir:null,lev:2};
var autoTimer=null, autoLeft=0;   // 결과 화면 자동 넘김 타이머
var bind={ma:true, boll:false, ichi:false};   // 차트 지표 토글 (이평선/볼린저/일목)

/* 실제 바이낸스 차트 데이터 (종목 숨김·가격 정규화, 각 100캔들 = 공개70 + 예측30) */
var BATTLE_DATA=(window.CHARTS&&window.CHARTS.length)?window.CHARTS:[];
var _segBag=[];
function pickSeg(){
  if(!_segBag.length){ _segBag=BATTLE_DATA.map(function(_,i){return i;});
    for(var i=_segBag.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=_segBag[i];_segBag[i]=_segBag[j];_segBag[j]=t;} }
  var seg=BATTLE_DATA[_segBag.pop()];
  return {cs:seg.cs, vis:seg.cs.length-30, n:seg.cs.length, sym:seg.sym, tf:seg.tf};
}
/* 차트 뷰포트(윈도우): 1000+봉 중 일부만 크게 보여주고 드래그/휠로 과거 탐색 */
var DEFCOUNT=170, view={count:170, start:0};
function clampView(){ var n=GD?GD.n:200; if(view.count>n)view.count=n; if(view.count<28)view.count=28; if(view.start<0)view.start=0; if(view.start>n-view.count)view.start=n-view.count; }
function resetView(){ view.count=Math.min(GD.n,DEFCOUNT); view.start=GD.n-view.count; clampView(); }
function sma(cl,per,up){var o=[],s=0;for(var i=0;i<up;i++){s+=cl[i];if(i>=per)s-=cl[i-per];o[i]=i>=per-1?s/per:null;}return o;}
/* 볼린저밴드 (공개 구간까지만, 미래 누출 없음) */
function bollB(cl,per,k,up){var mid=sma(cl,per,up),up2=[],lo2=[];for(var i=0;i<up;i++){var m=mid[i];if(m==null){up2[i]=null;lo2[i]=null;continue;}var ss=0;for(var j=i-per+1;j<=i;j++){var d=cl[j]-m;ss+=d*d;}var sd=Math.sqrt(ss/per);up2[i]=m+k*sd;lo2[i]=m-k*sd;}return{mid:mid,up:up2,lo:lo2};}
/* 일목균형표 (전환·기준·선행스팬) — cs 사용, 공개 구간까지만 */
function ichiB(cs,up){var t=[],kj=[],sa=[],sb=[];function mid(per,i){if(i<per-1)return null;var hi=-1e9,lo=1e9;for(var j=i-per+1;j<=i;j++){if(cs[j][1]>hi)hi=cs[j][1];if(cs[j][2]<lo)lo=cs[j][2];}return(hi+lo)/2;}for(var i=0;i<up;i++){var tt=mid(9,i),kk=mid(26,i);t[i]=tt;kj[i]=kk;sa[i]=(tt!=null&&kk!=null)?(tt+kk)/2:null;sb[i]=mid(52,i);}return{tenkan:t,kijun:kj,spanA:sa,spanB:sb};}

function drawChart(){
  var cv=$('chart'),ctx=cv.getContext('2d'),r=cv.getBoundingClientRect(); if(r.width<2)return;
  var dpr=window.devicePixelRatio||1; cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  var W=r.width,H=r.height; ctx.clearRect(0,0,W,H);
  var padL=8,axisW=44,plotR=W-axisW,pT=10,pB=H-14, cs=GD.cs,n=GD.n,vis=GD.vis,rev=gRev;
  clampView();
  var cw=(plotR-padL)/view.count, cx=function(i){return padL+cw*(i-view.start+0.5);};
  var v0=Math.max(0,Math.floor(view.start)), v1=Math.min(rev,Math.ceil(view.start+view.count));
  var cl=cs.map(function(c){return c[3];}),lo=1e9,hi=-1e9;
  for(var i=v0;i<v1;i++){if(cs[i][2]<lo)lo=cs[i][2];if(cs[i][1]>hi)hi=cs[i][1];}
  if(lo>hi){lo=cs[vis-1][3]*0.99;hi=cs[vis-1][3]*1.01;}
  var pad=(hi-lo)*0.12||1;lo-=pad;hi+=pad;var yOf=function(p){return pB-(p-lo)/(hi-lo)*(pB-pT);};
  for(var g=0;g<=4;g++){var yy=pT+(pB-pT)*g/4;ctx.strokeStyle='rgba(40,70,120,.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(plotR,yy);ctx.stroke();
    ctx.fillStyle='#5b7bb0';ctx.font='9px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText((hi-(hi-lo)*g/4).toFixed(2),plotR+4,yy);}
  var sx=cx(rev)-cw/2, fx=Math.min(plotR,cx(n-1)+cw/2), s2=Math.max(padL,sx);
  if(fx>s2){ctx.fillStyle='rgba(233,185,73,.06)';ctx.fillRect(s2,pT,fx-s2,pB-pT);
    if(sx>=padL&&sx<=plotR){ctx.strokeStyle='rgba(233,185,73,.45)';ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(sx,pT);ctx.lineTo(sx,pB);ctx.stroke();ctx.setLineDash([]);}
    if(phase==='pick'){ctx.fillStyle='#E9B949';ctx.textAlign='center';ctx.fillText('미래 예측 구간',(s2+fx)/2,pT+8);ctx.textAlign='left';}}
  ctx.save();ctx.beginPath();ctx.rect(padL,pT,plotR-padL,pB-pT);ctx.clip();
  var a=Math.max(0,v0-1),b=Math.min(rev,v1+1);
  var glow=function(col,arr,w){ctx.strokeStyle=col;ctx.lineWidth=w;ctx.shadowColor=col;ctx.shadowBlur=5;ctx.beginPath();var st=false;for(var i=a;i<b;i++){if(arr[i]==null)continue;var x=cx(i),y=yOf(arr[i]);if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);}ctx.stroke();ctx.shadowBlur=0;};
  if(bind.ichi){ var ic=ichiB(cs,rev); ctx.beginPath(); var st0=false;
    for(var ii=a;ii<b;ii++){ if(ic.spanA[ii]==null||ic.spanB[ii]==null)continue; var xx=cx(ii); if(!st0){ctx.moveTo(xx,yOf(ic.spanA[ii]));st0=true;} else ctx.lineTo(xx,yOf(ic.spanA[ii])); }
    for(var jj=b-1;jj>=a;jj--){ if(ic.spanA[jj]==null||ic.spanB[jj]==null)continue; ctx.lineTo(cx(jj),yOf(ic.spanB[jj])); }
    if(st0){ ctx.closePath(); ctx.fillStyle='rgba(43,212,196,.12)'; ctx.fill(); }
    glow('#2BD4C4',ic.tenkan,1.1); glow('#E0679F',ic.kijun,1.1); }
  if(bind.boll){ var bb=bollB(cl,20,2,rev); glow('rgba(120,180,240,.85)',bb.mid,1); glow('rgba(120,180,240,.5)',bb.up,1); glow('rgba(120,180,240,.5)',bb.lo,1); }
  if(bind.ma){ glow('#FFD54A',sma(cl,5,rev),1.3); glow('#4CC3FF',sma(cl,20,rev),1.3); }
  var bw=Math.max(1,cw*0.62),gl=cw>3?3:0;
  for(var i=v0;i<Math.min(rev,v1);i++){var c=cs[i],up=c[3]>=c[0],col=up?'#F0616D':'#4C8DF6',x=cx(i);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.shadowColor=col;ctx.shadowBlur=gl;ctx.beginPath();ctx.moveTo(x,yOf(c[1]));ctx.lineTo(x,yOf(c[2]));ctx.stroke();ctx.shadowBlur=0;
    var yo=yOf(c[0]),yc=yOf(c[3]);ctx.fillStyle=col;ctx.fillRect(x-bw/2,Math.min(yo,yc),bw,Math.max(1,Math.abs(yc-yo)));}
  ctx.restore();
  var entry=cs[vis-1][3],ey=yOf(entry);ctx.strokeStyle='rgba(233,185,73,.6)';ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(padL,ey);ctx.lineTo(plotR,ey);ctx.stroke();ctx.setLineDash([]);
  if(phase==='pick'){ctx.fillStyle='rgba(147,160,188,.55)';ctx.font='9px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='left';ctx.fillText('◀ 드래그·휠로 확대/축소',padL+4,pB-3);}
}

/* 단상 렌더 */
function renderPods(){
  var lead=Math.max.apply(null,players.map(function(p){return p.score;}));
  $('podiums').innerHTML=players.map(function(p,i){
    var av=p.chImg?'<img class="ch" src="'+p.chImg+'" alt="">':'<span class="em">'+p.em+'</span>';
    var pk=p.pick, reveal=(phase!=='pick'), known=(i===0||reveal)&&pk;   // 봇 선택은 공개 단계에서만
    var pkc=known?pk:'Q', pklab=known?{L:'롱 ↗',S:'숏 ↘',W:'관망 ◎'}[pk]:'?';
    return '<div class="pod">'
      +'<div class="pick '+pkc+' on">'+pklab+'</div>'
      +'<div class="ava">'+av+'</div>'
      +'<div class="desk'+(i===0?' me':'')+(p.score===lead&&phase==='result'?' lead':'')+'">'
        +'<div class="crown">👑</div>'
        +'<div class="nm">'+(i===0?'⭐ ':'')+p.name+'</div>'
        +'<div class="led">'+fmtLead(p.score)+'P</div>'
        +'<div class="delta" id="dl'+i+'"></div>'
      +'</div></div>';
  }).join('');
}
function fmtScore(v){ var s=(v<0?'-':'')+('000'+Math.abs(v)).slice(-4); return s; }
/* 리더보드용 누적 손익(P) 표기 */
function fmtLead(v){ v=Math.round(v); var a=Math.abs(v); var s=a>=100000?Math.round(v/1000)+'K':a>=10000?(v/1000).toFixed(1).replace('.0','')+'K':fmtP(v); return (v>0?'+':'')+s; }

/* 컨트롤 */
function renderCtrl(){
  ['L','S','W'].forEach(function(d){ $('d'+d).classList.toggle('on', mySel.dir===d); });
  var bal=getBal(); var bb=$('bbal'); if(bb)bb.textContent='💰 '+fmtP(bal);
  $('bets').innerHTML=BETPCTS.map(function(b){ return '<div class="bet'+(mySel.betPct===b[0]?' on':'')+'" data-bp="'+b[0]+'">'+b[1]+'</div>'; }).join('');
  $('levs').innerHTML=[1,2,3,5,10].map(function(l){return '<div class="lev'+(mySel.lev===l?' on':'')+'" data-lev="'+l+'">'+l+'배</div>';}).join('');
  var go=$('go'), bet=curBet();
  if(phase==='pick'){ go.className='go';
    if(mySel.dir===null) go.textContent='방향을 골라주세요';
    else if(mySel.dir==='W') go.textContent='◎ 관망 (-5%) 확정 ▶';
    else go.textContent='💰'+fmtP(bet)+'P · '+({L:'롱',S:'숏'}[mySel.dir])+' '+mySel.lev+'배 확정 ▶';
    go.disabled=(mySel.dir===null)||(bal<=0&&mySel.dir!=='W'); }
  else if(phase==='result'){ go.className='go next'; go.textContent=(round>=ROUNDS?'🏆 최종 결과':'다음 라운드 ▶'); go.disabled=false; }
  else { go.className='go'; go.disabled=true; go.textContent='공개 중…'; }
}
$('dL').onclick=function(){pick('L');}; $('dS').onclick=function(){pick('S');}; $('dW').onclick=function(){pick('W');};
function pick(d){ if(phase!=='pick')return; mySel.dir=d; players[0].pick=d; renderCtrl(); renderPods(); }
$('levs').onclick=function(e){ var l=e.target.closest('[data-lev]'); if(l&&phase==='pick'){mySel.lev=+l.dataset.lev; players[0].lev=mySel.lev; renderCtrl();} };
$('indbar').onclick=function(e){ var el=e.target.closest('[data-ind]'); if(!el)return; var k=el.dataset.ind; bind[k]=!bind[k]; el.classList.toggle('on',bind[k]); drawChart(); };
$('bets').onclick=function(e){ var b=e.target.closest('[data-bp]'); if(b&&phase==='pick'){ mySel.betPct=+b.dataset.bp; renderCtrl(); } };
$('go').onclick=function(){ if(phase==='pick'){ if(mySel.dir===null){toast('방향을 선택하세요');return;} lockIn(); } else if(phase==='result'){ nextRound(); } };
$('endbtn').onclick=function(){ toast('데모 — 로비로'); };

function toast(m){ var t=$('msg'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1200); }

/* 이모티콘 (약올림·울음·서두르기 등 — 채팅 대신 감정만 표현해 분란 방지) */
var EMOS=['😝','😭','⏰','😎','😱','🔥','👍','😂','😡','💪'];
function pickOne(a){ return a[Math.floor(Math.random()*a.length)]; }
function floatEmote(i,emoji){ var pods=document.querySelectorAll('#podiums .pod'); var pod=pods[i]; if(!pod)return;
  var s=document.createElement('span'); s.className='emote'; s.textContent=emoji; pod.appendChild(s);
  setTimeout(function(){ if(s.parentNode)s.parentNode.removeChild(s); },1750); }
function botReact(){ var best=Math.max.apply(null,players.map(function(p){return p.dp;})), worst=Math.min.apply(null,players.map(function(p){return p.dp;}));
  players.forEach(function(p,i){ if(i===0)return; var e=null;
    if(p.dp===best&&p.dp>0) e=(players[0].dp<p.dp)?pickOne(['😝','😎','🔥']):pickOne(['😎','💪']);   // 이기고 나보다 잘하면 약올림
    else if(p.dp===worst&&p.dp<0) e=pickOne(['😭','😱','😡']);                                        // 최하위·손실이면 울음
    else if(p.dp>0) e=pickOne(['👍','😄']); else if(p.dp<0) e=pickOne(['😢','💧']);
    if(e){ (function(idx,em){ setTimeout(function(){ floatEmote(idx,em); }, 300+Math.random()*800); })(i,e); } }); }
(function(){ var pop=$('emopop'), btn=$('emobtn'); if(!pop||!btn)return;
  pop.innerHTML=EMOS.map(function(e){return '<span data-e="'+e+'">'+e+'</span>';}).join('');
  btn.onclick=function(ev){ ev.stopPropagation(); pop.classList.toggle('on'); };
  pop.onclick=function(ev){ var s=ev.target.closest('[data-e]'); if(!s)return; floatEmote(0,s.dataset.e); pop.classList.remove('on'); };
  document.addEventListener('click',function(ev){ if(!ev.target.closest('#emobar')) pop.classList.remove('on'); }); })();

/* 봇 선택(공개 구간만 사용) */
function botPick(p){
  var cs=GD.cs,vis=GD.vis,cl=cs.map(function(c){return c[3];}),ma=sma(cl,20,vis),last=cl[vis-1],m=ma[vis-1]||last;
  var up=last>=m, s=(round*7+p.name.length)%100;
  if(p.strat==='trend') return up?'L':'S';
  if(p.strat==='counter') return up?'S':'L';
  return ['L','S','W'][s%3];
}

/* 라운드 시작 */
function startRound(){ clearAutoNext();
  phase='pick'; GD=pickSeg(); gRev=GD.vis; resetView(); tleft=15; mySel={dir:null,lev:2,betPct:(mySel&&mySel.betPct)||0.25}; $('chartid').classList.remove('show'); var _bs=$('bShare'); if(_bs)_bs.style.display='none';
  players.forEach(function(p){p.pick=null;p.dp=0;});
  $('round').textContent='ROUND '+round+' / '+ROUNDS;
  $('tvtag').textContent='난이도 '+'◆'.repeat(3+(round%3))+'◇'.repeat(5-(3+(round%3)));
  $('verdict').classList.remove('show');
  renderPods(); renderCtrl(); drawChart(); $('tnum').textContent=tleft; $('tbar').style.width='100%';
  if(tmr)clearInterval(tmr);
  tmr=setInterval(function(){ tleft--; $('tnum').textContent=Math.max(0,tleft); $('tbar').style.width=(Math.max(0,tleft)/15*100)+'%';
    if(tleft===7 && mySel.dir===null){ floatEmote(1+Math.floor(Math.random()*3), pickOne(['⏰','🏃','😤'])); }
    if(tleft<=0){ clearInterval(tmr); if(phase==='pick') lockIn(); } },1000);
}
function lockIn(){
  if(phase!=='pick')return; clearInterval(tmr); phase='reveal';
  if(players[0].pick===null){ players[0].pick='W'; }
  roundBet = (players[0].pick==='W') ? 0 : Math.min(getBal(), Math.max(1, Math.round(getBal()*mySel.betPct)));  // 이 라운드 배팅액 확정 (방향 걸면 최소 1P)
  players.forEach(function(p,i){ if(i>0) p.pick=botPick(p); });
  renderPods(); renderCtrl(); resetView(); drawChart();
  var target=GD.vis+30;
  if(reduce){ gRev=target; finishRound(); return; }
  if(revTimer)clearTimeout(revTimer);
  function step(){ gRev++; drawChart();
    if(gRev>=target){ revTimer=null; finishRound(); return; }
    revTimer=setTimeout(step, (target-gRev)<=8 ? 400 : 150); }   // 마지막 8칸은 더 천천히 (긴장감)
  revTimer=setTimeout(step, 150);
}
function finishRound(){
  gRev=GD.vis+30; drawChart();
  var cs=GD.cs,vis=GD.vis,entry=cs[vis-1][3],exit=cs[vis-1+30][3];
  var moveRaw=(exit-entry)/entry*100;                 // 코인 실제 % 움직임 (+오름 / -내림)
  var bal0=getBal();
  var botBet=Math.max(100, Math.round(bal0*0.25));    // 봇 기본 스테이크(비교용)
  players.forEach(function(p,i){ var pnl;
    if(p.pick==='W'){ pnl=-Math.round(bal0*0.05); }         // 관망도 -5% 페널티 (잔고 기준)
    else { var bet=(i===0)?roundBet:botBet; var sign=p.pick==='L'?1:-1;
      var ret=sign*moveRaw*p.lev;                           // 방향 기준 수익률%(레버리지 포함)
      pnl=Math.round(bet*ret/100); if(pnl<-bet)pnl=-bet; }  // 손실은 배팅액까지만
    if(i===0 && pnl<-bal0) pnl=-bal0;                        // 내 손실은 잔고까지만
    p.dp=pnl; p.score+=pnl; });
  var meP=players[0].dp, nb=bal0+meP; setBal(nb);      // 내 보유 포인트 실제 반영
  phase='result'; renderPods(); renderCtrl();
  $('chartid').innerHTML='🔍 실제 차트 공개 · <b>'+GD.sym+' '+GD.tf+'</b><span class="rl">Binance 실데이터</span>'; $('chartid').classList.add('show');
  // 델타(P) 애니메이션
  players.forEach(function(p,i){ var d=$('dl'+i); if(!d)return; if(p.dp===0){d.textContent='±0';d.style.color='#93A0BC';}
    else{d.textContent=(p.dp>0?'+':'')+fmtP(p.dp); d.style.color=p.dp>0?'#35D07A':'#FF5C8A';} d.style.opacity='1'; d.style.top='-26px'; });
  // 코인 움직임 + 내 손익 크게 공개
  var pk=players[0].pick, dl={L:'롱',S:'숏',W:'관망'}[pk];
  var arrow=moveRaw>=0?'▲':'▼', mvcol=moveRaw>=0?'#35D07A':'#FF5C8A';
  var plHtml = (pk==='W') ? ('관망 · <b style="color:#FF5C8A">-5% ('+fmtP(meP)+'P)</b>')
    : (dl+' '+players[0].lev+'배 · '+fmtP(roundBet)+'P → <b style="color:'+(meP>=0?'#35D07A':'#FF5C8A')+'">'+(meP>=0?'+':'')+fmtP(meP)+'P</b>');
  var v=$('verdict');
  v.innerHTML='<div class="mv" style="color:'+mvcol+'">코인 '+arrow+' '+Math.abs(moveRaw).toFixed(1)+'%</div>'
    +'<div class="pl">'+plHtml+'</div>'
    +'<div class="bl">보유 '+fmtP(bal0)+' → <b>'+fmtP(nb)+'P</b></div>';
  v.classList.add('show');
  botReact(); _battleCard();
  if(bal0>0 && meP<0 && nb<=0){ if(tmr)clearInterval(tmr); clearAutoNext(); var gq=$('go'); if(gq)gq.disabled=true;   // 실제 손실로 0이 됐을 때만 파산
    var cbn=comeback();
    toast(cbn ? ('💥 파산! 재기 보상 +1,000P 지급 (오늘 '+cbn+'/5회)') : '💥 파산! 오늘 재기 보상(5회)을 모두 사용했어요 · 내일 다시');
    setTimeout(function(){ finalResult(); }, 2800); }
  else { startAutoNext(); }   // 10초 뒤 자동으로 다음 라운드
}
function nextRound(){ clearAutoNext();
  if(round>=ROUNDS){ finalResult(); return; }
  round++; startRound();
}
/* 결과 화면에서 10초 뒤 자동으로 다음 라운드 (버튼 미클릭 시) */
function clearAutoNext(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } }
function updateGoCountdown(){ var go=$('go'); if(go&&phase==='result'){ go.textContent=(round>=ROUNDS?'🏆 최종 결과':'다음 라운드 ▶')+' ('+autoLeft+')'; } }
function startAutoNext(){ clearAutoNext(); autoLeft=10; updateGoCountdown();
  autoTimer=setInterval(function(){ autoLeft--; if(autoLeft<=0){ clearAutoNext(); nextRound(); } else updateGoCountdown(); }, 1000); }
function finalResult(){ clearAutoNext();
  var ranked=players.slice().sort(function(a,b){return b.score-a.score;});
  var champ = ranked[0]===players[0]?'우승! 축하합니다':'우승: '+ranked[0].name;
  var v=$('verdict'); v.style.color='';
  v.innerHTML='<div class="mv" style="color:#E9B949;font-size:26px">🏆 '+champ+'</div>'
    +'<div class="bl">최종 보유 <b>'+fmtP(getBal())+'P</b> · 이번 배틀 손익 '+(players[0].score>=0?'+':'')+fmtP(players[0].score)+'P</div>';
  v.classList.add('show');
  var go=$('go'); go.className='go next'; go.disabled=false; go.textContent='🔄 다시 하기';   // 파산 후에도 재시작 가능하도록 활성화
  go.onclick=function(){ if(getBal()<=0) comeback();   // 파산 시 재기 보상 (하루 5회, 1,000P)
    players.forEach(function(p){p.score=0;p.pick=null;p.dp=0;}); round=1; startRound(); go.onclick=function(){ if(phase==='pick'){if(mySel.dir===null){toast('방향을 선택하세요');return;}lockIn();}else if(phase==='result'){nextRound();} }; };
}

(function(){ var cv=$('chart'); if(!cv)return; cv.style.touchAction='none'; cv.style.cursor='grab'; var drag=null;
  function ppc(){ var r=cv.getBoundingClientRect(); return Math.max(0.5,(r.width-52)/view.count); }
  cv.addEventListener('pointerdown',function(e){ drag={x:e.clientX,s:view.start}; try{cv.setPointerCapture(e.pointerId);}catch(_){} cv.style.cursor='grabbing'; });
  cv.addEventListener('pointermove',function(e){ if(!drag)return; view.start=drag.s-(e.clientX-drag.x)/ppc(); clampView(); drawChart(); });
  function end(){ drag=null; cv.style.cursor='grab'; } cv.addEventListener('pointerup',end); cv.addEventListener('pointercancel',end);
  cv.addEventListener('wheel',function(e){ e.preventDefault(); var r=cv.getBoundingClientRect(); var f=(e.clientX-r.left-8)/Math.max(1,(r.width-52)); f=Math.max(0,Math.min(1,f));
    var anchor=view.start+f*view.count; view.count*=(e.deltaY>0?1.15:0.87); clampView(); view.start=anchor-f*view.count; clampView(); drawChart(); },{passive:false}); })();
/* ===== 인증짤 (배틀 결과 공유 카드) ===== */
var _cardData=null, CFF="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif";
function symKo(s){var m={BTCUSDT:'비트코인',ETHUSDT:'이더리움',SOLUSDT:'솔라나',BNBUSDT:'BNB',XRPUSDT:'리플',DOGEUSDT:'도지코인',ADAUSDT:'에이다',LINKUSDT:'체인링크',AVAXUSDT:'아발란체',DOTUSDT:'폴카닷',LTCUSDT:'라이트코인'};return m[s]||s||'';}
function _rr(c,a,b,w,ht,r){c.beginPath();c.moveTo(a+r,b);c.arcTo(a+w,b,a+w,b+ht,r);c.arcTo(a+w,b+ht,a,b+ht,r);c.arcTo(a,b+ht,a,b,r);c.arcTo(a,b,a+w,b,r);c.closePath();}
function _limg(src){return new Promise(function(res){if(!src){res(null);return;}var im=new Image();im.onload=function(){res(im);};im.onerror=function(){res(null);};im.src=src;});}
function _spark(x,d,acc,X,Y,W2,H2){ var cs=d.cs; if(!cs||cs.length<2)return; var cl=cs.map(function(c){return c[3];});
  var lo=Math.min.apply(null,cl),hi=Math.max.apply(null,cl),pad=(hi-lo)*.12||1;lo-=pad;hi+=pad; var n=cl.length;
  var xa=function(i){return X+i/(n-1)*W2;}, ya=function(v){return Y+H2-(v-lo)/(hi-lo)*H2;};
  x.beginPath();x.moveTo(xa(0),ya(cl[0]));for(var i=1;i<n;i++)x.lineTo(xa(i),ya(cl[i]));x.lineTo(xa(n-1),Y+H2);x.lineTo(xa(0),Y+H2);x.closePath();
  var ag=x.createLinearGradient(0,Y,0,Y+H2);ag.addColorStop(0,acc+'44');ag.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=ag;x.fill();
  x.beginPath();x.moveTo(xa(0),ya(cl[0]));for(var i=1;i<n;i++)x.lineTo(xa(i),ya(cl[i]));x.strokeStyle=acc;x.lineWidth=4;x.lineJoin='round';x.stroke();
  if(d.entryIdx!=null&&d.entryIdx>=0&&d.entryIdx<n){x.setLineDash([7,7]);x.strokeStyle='rgba(233,185,73,.75)';x.beginPath();x.moveTo(xa(d.entryIdx),Y);x.lineTo(xa(d.entryIdx),Y+H2);x.stroke();x.setLineDash([]);}
  x.fillStyle=acc;x.beginPath();x.arc(xa(n-1),ya(cl[n-1]),10,0,Math.PI*2);x.fill();x.strokeStyle='#fff';x.lineWidth=3;x.stroke(); }
function makeCard(d,cb){
  var W=1080,H=1080,C=document.createElement('canvas');C.width=W;C.height=H;var x=C.getContext('2d');
  var acc=d.kind==='liq'?'#FF4D5E':d.kind==='profit'?'#35D07A':d.kind==='loss'?'#FF7A9C':'#E9B949';
  Promise.all([_limg('assets/logo_wordmark.png'),_limg('assets/qr.png'),_limg(d.chImg)]).then(function(im){
    var logo=im[0],qr=im[1],av=im[2];
    var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0e1c3a');g.addColorStop(1,'#05070f');x.fillStyle=g;x.fillRect(0,0,W,H);
    var rg=x.createRadialGradient(W/2,470,60,W/2,470,660);rg.addColorStop(0,acc+'2e');rg.addColorStop(1,'rgba(5,7,15,0)');x.fillStyle=rg;x.fillRect(0,0,W,H);
    x.strokeStyle='rgba(120,150,200,.22)';x.lineWidth=3;_rr(x,22,22,W-44,H-44,34);x.stroke();
    if(logo){var lw=320,lh=lw*logo.height/logo.width;x.drawImage(logo,(W-lw)/2,64,lw,lh);}
    x.fillStyle='#9fb3d0';x.textAlign='center';x.font='600 25px '+CFF;x.fillText('실전처럼 배우는 차트 배틀 · 교육용(가상 포인트)',W/2,180);
    var ax=150,ay=248,ad=150;
    x.save();x.beginPath();x.arc(ax,ay+ad/2,ad/2,0,Math.PI*2);x.closePath();x.fillStyle='#0a1428';x.fill();x.clip();
    if(av){var sc=Math.max(ad/av.width,ad/av.height)*1.55,iw=av.width*sc,ih=av.height*sc;x.drawImage(av,ax-iw/2,ay+ad/2-ih*0.60,iw,ih);}
    x.restore();
    x.strokeStyle=acc;x.lineWidth=5;x.beginPath();x.arc(ax,ay+ad/2,ad/2,0,Math.PI*2);x.stroke();
    x.textAlign='left';x.fillStyle='#EAF0FA';x.font='900 48px '+CFF;x.fillText((d.nick||'트레이더').slice(0,10),ax+ad/2+34,ay+56);
    x.fillStyle=acc;x.font='800 30px '+CFF;x.fillText(d.badge,ax+ad/2+34,ay+104);
    x.textAlign='center';x.fillStyle=acc;x.font='900 168px '+CFF;x.fillText(d.pct,W/2,548);
    x.fillStyle='#EAF0FA';x.font='800 48px '+CFF;x.fillText(d.meme,W/2,628);
    x.fillStyle='#c7d5ea';x.font='700 34px '+CFF;x.fillText(symKo(d.sym)+'  '+d.tf+'   ·   '+d.dirKo+(d.dirKo!=='관망'?' '+d.lev+'배':''),W/2,700);
    x.fillStyle='#8ea6c8';x.font='600 27px '+CFF;x.fillText('진입 '+d.entry+'   →   종료 '+d.exit,W/2,742);
    _spark(x,d,acc,70,782,W-140,150);
    if(qr)x.drawImage(qr,60,H-192,142,142);
    x.textAlign='left';x.fillStyle='#dbe8fb';x.font='800 36px '+CFF;x.fillText('지금 도전 →',236,H-116);
    x.fillStyle='#7fb0ff';x.font='700 30px '+CFF;x.fillText('jansang18.github.io/chartarena-web',236,H-70);
    cb(C);
  });
}
function shareCard(d){ if(!d)return; makeCard(d,function(C){ C.toBlob(function(blob){ if(!blob)return;
  var file=new File([blob],'chartarena.png',{type:'image/png'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file],title:'차트아레나',text:d.shareText}).catch(function(){}); }
  else { var u=URL.createObjectURL(blob),a=document.createElement('a'); a.href=u; a.download='chartarena_인증.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(u);},2000); }
},'image/png'); }); }
function _battleCard(){ var me=players[0]; if(!me||!GD)return;
  var vis=GD.vis, cs=GD.cs, entry=cs[vis-1][3], exit=cs[vis-1+30][3];
  var sign=me.pick==='L'?1:(me.pick==='S'?-1:0), ret=sign*(exit-entry)/entry*100*(me.lev||1);
  var kind=me.pick==='W'?'watch':(ret<=-100?'liq':ret>0?'profit':'loss');
  var pctS=me.pick==='W'?'관망':((ret>=0?'+':'')+ret.toFixed(2)+'%');
  var dirKo={L:'롱',S:'숏',W:'관망'}[me.pick]||'관망', w0=Math.max(0,vis-1-40);
  _cardData={ kind:kind, pct:pctS, dirKo:dirKo, lev:me.lev, sym:GD.sym||'', tf:GD.tf||'',
    entry:(Math.round(entry*100)/100), exit:(Math.round(exit*100)/100), nick:myNick||'트레이더', chImg:me.chImg||'assets/hu0.png',
    badge:kind==='liq'?'💥 청산':kind==='profit'?(ret>=50?'🚀 떡상':'👍 익절'):kind==='loss'?'💧 손실':'◎ 관망',
    meme:kind==='liq'?'배틀 청산… 홈으로 추방 💀':kind==='profit'?(ret>=50?'떡상! 이번 판 접수 🚀':'배틀 익절 👍'):kind==='loss'?'물렸다… 다음 판 복수 💧':'관망도 전략 ◎',
    cs:cs.slice(w0,vis-1+31), entryIdx:Math.min(40,vis-1),
    shareText:'차트아레나 배틀 '+pctS+'! 너도 도전 → jansang18.github.io/chartarena-web' };
  var b=$('bShare'); if(b){b.style.display=''; b.onclick=function(){ if(_cardData)shareCard(_cardData); };}
}
window.addEventListener('resize',drawChart);
startRound();
})();
