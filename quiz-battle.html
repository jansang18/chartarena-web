  var padL=8,axisW=44,plotR=W-axisW,pT=10,pB=H-14, cs=GD.cs,n=GD.n,vis=GD.vis,rev=gRev,cw=(plotR-padL)/n,cx=function(i){return padL+cw*(i+0.5);};
  var cl=cs.map(function(c){return c[3];}),lo=1e9,hi=-1e9;
  for(var i=0;i<rev;i++){if(cs[i][2]<lo)lo=cs[i][2];if(cs[i][1]>hi)hi=cs[i][1];}
  var pad=(hi-lo)*0.12;lo-=pad;hi+=pad;var yOf=function(p){return pB-(p-lo)/(hi-lo)*(pB-pT);};
  for(var g=0;g<=4;g++){var yy=pT+(pB-pT)*g/4;ctx.strokeStyle='rgba(40,70,120,.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,yy);ctx.lineTo(plotR,yy);ctx.stroke();
    ctx.fillStyle='#5b7bb0';ctx.font='9px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText((hi-(hi-lo)*g/4).toFixed(3),plotR+4,yy);}
  if(rev<n){var sx=cx(rev)-cw/2;ctx.fillStyle='rgba(233,185,73,.06)';ctx.fillRect(sx,pT,plotR-sx,pB-pT);
    ctx.strokeStyle='rgba(233,185,73,.45)';ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(sx,pT);ctx.lineTo(sx,pB);ctx.stroke();ctx.setLineDash([]);
    if(phase==='pick'){ctx.fillStyle='#E9B949';ctx.textAlign='center';ctx.fillText('미래 예측 구간',(sx+plotR)/2,pT+8);}}
  var glow=function(col,arr,w){ctx.strokeStyle=col;ctx.lineWidth=w;ctx.shadowColor=col;ctx.shadowBlur=5;ctx.beginPath();var st=false;for(var i=0;i<rev;i++){if(arr[i]==null)continue;var x=cx(i),y=yOf(arr[i]);if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);}ctx.stroke();ctx.shadowBlur=0;};
  glow('#FFD54A',sma(cl,5,rev),1.3); glow('#4CC3FF',sma(cl,20,rev),1.3);
  for(var i=0;i<rev;i++){var c=cs[i],up=c[3]>=c[0],col=up?'#F0616D':'#4C8DF6',x=cx(i);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.shadowColor=col;ctx.shadowBlur=3;ctx.beginPath();ctx.moveTo(x,yOf(c[1]));ctx.lineTo(x,yOf(c[2]));ctx.stroke();ctx.shadowBlur=0;
    var bw=Math.max(2,cw*0.62),yo=yOf(c[0]),yc=yOf(c[3]);ctx.fillStyle=col;ctx.fillRect(x-bw/2,Math.min(yo,yc),bw,Math.max(1.5,Math.abs(yc-yo)));}
  var entry=cs[vis-1][3],ey=yOf(entry);ctx.strokeStyle='rgba(233,185,73,.6)';ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(padL,ey);ctx.lineTo(plotR,ey);ctx.stroke();ctx.setLineDash([]);
}

/* 단상 렌더 */
function renderPods(){
  var lead=Math.max.apply(null,players.map(function(p){return p.score;}));
  $('podiums').innerHTML=players.map(function(p,i){
    var av=p.chImg?'<img src="'+p.chImg+'" alt="">':'<span class="em">'+p.em+'</span>';
    var pk=p.pick, reveal=(phase!=='pick'), known=(i===0||reveal)&&pk;   // 봇 선택은 공개 단계에서만
    var pkc=known?pk:'Q', pklab=known?{L:'롱 ↗',S:'숏 ↘',W:'관망 ◎'}[pk]:'?';
    return '<div class="pod">'
      +'<div class="pick '+pkc+' on">'+pklab+'</div>'
      +'<div class="ava">'+av+'</div>'
      +'<div class="desk'+(i===0?' me':'')+(p.score===lead&&phase==='result'?' lead':'')+'">'
        +'<div class="crown">👑</div>'
        +'<div class="nm">'+(i===0?'⭐ ':'')+p.name+'</div>'
        +'<div class="led">'+fmtScore(p.score)+'</div>'
        +'<div class="delta" id="dl'+i+'"></div>'
      +'</div></div>';
  }).join('');
}
function fmtScore(v){ var s=(v<0?'-':'')+('000'+Math.abs(v)).slice(-4); return s; }

/* 컨트롤 */
function renderCtrl(){
  ['L','S','W'].forEach(function(d){ $('d'+d).classList.toggle('on', mySel.dir===d); });
  $('levs').innerHTML=[1,2,3,5,10].map(function(l){return '<div class="lev'+(mySel.lev===l?' on':'')+'" data-lev="'+l+'">'+l+'배</div>';}).join('');
  var go=$('go');
  if(phase==='pick'){ go.className='go'; go.textContent='확정 ▶'; go.disabled=(mySel.dir===null); }
  else if(phase==='result'){ go.className='go next'; go.textContent=(round>=ROUNDS?'🏆 최종 결과':'다음 라운드 ▶'); go.disabled=false; }
  else { go.className='go'; go.disabled=true; go.textContent='공개 중…'; }
}
$('dL').onclick=function(){pick('L');}; $('dS').onclick=function(){pick('S');}; $('dW').onclick=function(){pick('W');};
function pick(d){ if(phase!=='pick')return; mySel.dir=d; players[0].pick=d; renderCtrl(); renderPods(); }
$('levs').onclick=function(e){ var l=e.target.closest('[data-lev]'); if(l&&phase==='pick'){mySel.lev=+l.dataset.lev; players[0].lev=mySel.lev; renderCtrl();} };
$('go').onclick=function(){ if(phase==='pick'){ if(mySel.dir===null){toast('방향을 선택하세요');return;} lockIn(); } else if(phase==='result'){ nextRound(); } };
$('endbtn').onclick=function(){ toast('데모 — 로비로'); };

function toast(m){ var t=$('msg'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1200); }

/* 이모티콘 (약올림·울음·서두르기 등 — 채팅 대신 감정만 표현해 분란 방지) */
var EMOS=['😝','😭','⏰','😎','😱','🔥','👍','😂','😡','💪'];
function pickOne(a){ return a[Math.floor(Math.random()*a.length)]; }
function floatEmote(i,emoji){ var pods=document.querySelectorAll('#podiums .pod'); var pod=pods[i]; if(!pod)return;
  var s=document.createElement('span'); s.className='emote'; s.textContent=emoji; pod.appendChild(s);
  setTimeout(function(){ if(s.parentNode)s.parentNode.removeChild(s); },1750); }
function botReact(){ var best=Math.max.apply(null,players.map(function(p){return p.dp;})), worst=Math.min.apply(null,players.map(function(p){return p.dp;}));
  players.forEach(function(p,i){ if(i===0)return; var e=null;
    if(p.dp===best&&p.dp>0) e=(players[0].dp<p.dp)?pickOne(['😝','😎','🔥']):pickOne(['😎','💪']);   // 이기고 나보다 잘하면 약올림
    else if(p.dp===worst&&p.dp<0) e=pickOne(['😭','😱','😡']);                                        // 최하위·손실이면 울음
    else if(p.dp>0) e=pickOne(['👍','😄']); else if(p.dp<0) e=pickOne(['😢','💧']);
    if(e){ (function(idx,em){ setTimeout(function(){ floatEmote(idx,em); }, 300+Math.random()*800); })(i,e); } }); }
(function(){ var pop=$('emopop'), btn=$('emobtn'); if(!pop||!btn)return;
  pop.innerHTML=EMOS.map(function(e){return '<span data-e="'+e+'">'+e+'</span>';}).join('');
  btn.onclick=function(ev){ ev.stopPropagation(); pop.classList.toggle('on'); };
  pop.onclick=function(ev){ var s=ev.target.closest('[data-e]'); if(!s)return; floatEmote(0,s.dataset.e); pop.classList.remove('on'); };
  document.addEventListener('click',function(ev){ if(!ev.target.closest('#emobar')) pop.classList.remove('on'); }); })();

/* 봇 선택(공개 구간만 사용) */
function botPick(p){
  var cs=GD.cs,vis=GD.vis,cl=cs.map(function(c){return c[3];}),ma=sma(cl,20,vis),last=cl[vis-1],m=ma[vis-1]||last;
  var up=last>=m, s=(round*7+p.name.length)%100;
  if(p.strat==='trend') return up?'L':'S';
  if(p.strat==='counter') return up?'S':'L';
  return ['L','S','W'][s%3];
}

/* 라운드 시작 */
function startRound(){
  phase='pick'; GD=pickSeg(); gRev=GD.vis; tleft=15; mySel={dir:null,lev:2}; $('chartid').classList.remove('show');
  players.forEach(function(p){p.pick=null;p.dp=0;});
  $('round').textContent='ROUND '+round+' / '+ROUNDS;
  $('tvtag').textContent='난이도 '+'◆'.repeat(3+(round%3))+'◇'.repeat(5-(3+(round%3)));
  $('verdict').classList.remove('show');
  renderPods(); renderCtrl(); drawChart(); $('tnum').textContent=tleft; $('tbar').style.width='100%';
  if(tmr)clearInterval(tmr);
  tmr=setInterval(function(){ tleft--; $('tnum').textContent=Math.max(0,tleft); $('tbar').style.width=(Math.max(0,tleft)/15*100)+'%';
    if(tleft===7 && mySel.dir===null){ floatEmote(1+Math.floor(Math.random()*3), pickOne(['⏰','🏃','😤'])); }
    if(tleft<=0){ clearInterval(tmr); if(phase==='pick') lockIn(); } },1000);
}
function lockIn(){
  if(phase!=='pick')return; clearInterval(tmr); phase='reveal';
  if(players[0].pick===null){ players[0].pick='W'; }
  players.forEach(function(p,i){ if(i>0) p.pick=botPick(p); });
  renderPods(); renderCtrl();
  var target=GD.vis+30;
  if(reduce){ gRev=target; finishRound(); return; }
  if(revTimer)clearInterval(revTimer);
  revTimer=setInterval(function(){ gRev++; drawChart(); if(gRev>=target){ clearInterval(revTimer); finishRound(); } },48);
}
function finishRound(){
  gRev=GD.vis+30; drawChart();
  var cs=GD.cs,vis=GD.vis,entry=cs[vis-1][3],exit=cs[vis-1+30][3];
  var liq=false;
  players.forEach(function(p){ var sign=p.pick==='L'?1:(p.pick==='S'?-1:0);
    var ret=sign*(exit-entry)/entry*100*p.lev; if(p.strat==='me'&&ret<=-100)liq=true; p.dp=Math.round(ret*3); p.score+=p.dp; });
  phase='result'; renderPods(); renderCtrl();
  $('chartid').innerHTML='🔍 실제 차트 공개 · <b>'+GD.sym+' '+GD.tf+'</b><span class="rl">Binance 실데이터</span>'; $('chartid').classList.add('show');
  if(liq){ if(tmr)clearInterval(tmr); var vq=$('verdict'); if(vq){vq.textContent='💥 청산! -100% · 홈으로 강제 이동…'; vq.style.color='#FF5C6C'; vq.classList.add('show');}
    var gq=$('go'); if(gq)gq.disabled=true; toast('💥 청산되었습니다 · 홈 화면으로 이동합니다'); botReact();
    setTimeout(function(){ try{location.href='index.html';}catch(e){} }, 2300); return; }
  // 델타 애니메이션
  players.forEach(function(p,i){ var d=$('dl'+i); if(!d)return; if(p.dp===0){d.textContent='±0';d.style.color='#93A0BC';}
    else{d.textContent=(p.dp>0?'+':'')+p.dp; d.style.color=p.dp>0?'#35D07A':'#FF5C8A';} d.style.opacity='1'; d.style.top='-26px'; });
  // 판정 문구
  var me=players[0], best=Math.max.apply(null,players.map(function(p){return p.dp;}));
  var v=$('verdict'); v.textContent = me.dp>0?(me.dp>=best?'🔥 이번 판 1등!':'👍 수익!'):(me.dp<0?'💧 손실…':'😐 관망');
  v.style.color = me.dp>0?'#35D07A':(me.dp<0?'#FF5C8A':'#E9B949'); v.classList.add('show');
  botReact();
}
function nextRound(){
  if(round>=ROUNDS){ finalResult(); return; }
  round++; startRound();
}
function finalResult(){
  var ranked=players.slice().sort(function(a,b){return b.score-a.score;});
  var v=$('verdict'); v.style.color='#E9B949';
  v.textContent = ranked[0]===players[0]?'🏆 우승! 축하합니다':'🏆 우승: '+ranked[0].name;
  v.classList.add('show');
  var go=$('go'); go.className='go next'; go.textContent='🔄 다시 하기';
  go.onclick=function(){ players.forEach(function(p){p.score=0;p.pick=null;p.dp=0;}); round=1; startRound(); go.onclick=function(){ if(phase==='pick'){if(mySel.dir===null){toast('방향을 선택하세요');return;}lockIn();}else if(phase==='result'){nextRound();} }; };
}

window.addEventListener('resize',drawChart);
startRound();
})();
</script>
