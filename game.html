<style>
  :root{
    --bg:#080B14; --navy:#0E1424; --navy2:#141C30;
    --gold:#E9B949; --golddim:#8A6D2B;
    --tprimary:#E6EAF2; --tsec:#8A93A6; --tmuted:#5A6478;
    --up:#F0616D; --down:#4C8DF6; --watch:#7C8AA5;
    --profit:#35C46A; --loss:#E5484D;
    --grid:#1B2436;
    --sans:"Segoe UI",-apple-system,"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    --mono:"Cascadia Mono",ui-monospace,"Consolas",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#05070f;
    color:var(--tprimary); font-family:var(--sans); height:100vh; overflow:hidden;
    display:flex; align-items:center; justify-content:center; padding:0}
  .app{width:min(100vw, calc(100vh * 1120 / 516)); aspect-ratio:1120 / 516; background:var(--bg);
    display:flex; flex-direction:column; border-radius:22px; overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 30px 80px -30px #000}
  .body{flex:1; min-height:0; display:flex}
  .chartcol{flex:1.6; min-width:0; display:flex; flex-direction:column; border-right:1px solid var(--navy2)}

  /* top bar */
  .top{display:flex; align-items:center; gap:10px; padding:14px 16px 10px; border-bottom:1px solid var(--navy2)}
  .homebtn{text-decoration:none; color:var(--tsec); font-size:12px; font-weight:700; background:var(--navy2);
    padding:5px 10px; border-radius:8px; white-space:nowrap}
  .homebtn:hover{color:var(--tprimary)}
  .logo{font-weight:900; font-size:17px}
  .logo .a{color:var(--gold)}
  .top .spacer{flex:1}
  .bal{text-align:right; line-height:1.1}
  .bal .k{font-size:9px; letter-spacing:.14em; color:var(--tmuted); text-transform:uppercase}
  .bal .v{font-family:var(--mono); font-weight:800; color:var(--gold); font-size:16px}
  .qtag{font-size:10px; color:var(--tsec); font-family:var(--mono); background:var(--navy2); padding:3px 8px; border-radius:6px}

  /* chart */
  .chartwrap{position:relative; margin:12px 12px 0; flex:1; min-height:0; border:1px solid var(--navy2); border-radius:12px;
    background:linear-gradient(180deg,#0b1120,#090d18); overflow:hidden}
  #chart{display:block; width:100%; height:100%; touch-action:none; cursor:grab}
  #chart:active{cursor:grabbing}
  .chip-diff{position:absolute; left:10px; top:8px; font-size:10px; color:var(--tsec);
    background:rgba(8,11,20,.72); border:1px solid var(--navy2); padding:2px 8px; border-radius:6px; font-family:var(--mono)}
  .hint-hidden{position:absolute; right:56px; top:8px; font-size:10px; color:var(--golddim); font-family:var(--mono)}
  .zoombtns{position:absolute; right:8px; bottom:8px; display:flex; gap:4px}
  .zoombtns button{width:28px; height:28px; border-radius:8px; border:1px solid var(--navy2);
    background:rgba(8,11,20,.82); color:var(--tsec); font-size:15px; font-weight:800; line-height:1; cursor:pointer;
    font-family:inherit; display:flex; align-items:center; justify-content:center}
  .zoombtns button:hover{color:var(--tprimary); border-color:var(--golddim)}
  .zoombtns button:active{transform:translateY(1px)}
  .panhint{position:absolute; left:10px; bottom:8px; font-size:9px; color:var(--tmuted); font-family:var(--mono);
    background:rgba(8,11,20,.6); padding:2px 7px; border-radius:5px; pointer-events:none}

  /* indicator toggle bar */
  .indbar{display:flex; gap:6px; overflow-x:auto; padding:9px 12px 3px; scrollbar-width:none}
  .indbar::-webkit-scrollbar{display:none}
  .itog{flex:0 0 auto; display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--tmuted);
    background:var(--navy); border:1px solid var(--navy2); border-radius:999px; padding:5px 11px; cursor:pointer;
    user-select:none; white-space:nowrap; font-family:inherit; -webkit-tap-highlight-color:transparent}
  .itog .dot{width:8px; height:8px; border-radius:2px; background:var(--tmuted)}
  .itog.on{color:var(--tprimary); border-color:var(--golddim)}
  .itog:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

  .scroll{flex:1; max-width:440px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--navy2) transparent; padding:14px 16px 22px}
  .scroll::-webkit-scrollbar{width:6px}.scroll::-webkit-scrollbar-thumb{background:var(--navy2);border-radius:3px}

  .lbl{font-size:11px; color:var(--tsec); font-weight:700; letter-spacing:.02em; margin:14px 2px 7px; display:flex; align-items:center; gap:6px}
  .lbl .sub{color:var(--tmuted); font-weight:400; font-size:10px}
  .row{display:flex; gap:6px}
  .row.wrap{flex-wrap:wrap}
  .chip{flex:1; text-align:center; padding:11px 4px; border-radius:9px; background:var(--navy); border:1px solid var(--navy2);
    color:var(--tsec); font-size:13px; font-weight:700; cursor:pointer; user-select:none; transition:all .12s;
    font-family:inherit; -webkit-tap-highlight-color:transparent}
  .chip small{display:block; font-size:9px; font-weight:400; color:var(--tmuted); margin-top:2px; font-family:var(--mono)}
  .chip:hover{border-color:var(--golddim)}
  .chip.on{color:var(--bg); border-color:transparent}
  .chip.on small{color:rgba(8,11,20,.7)}
  .chip.dir-LONG.on{background:var(--up)} .chip.dir-SHORT.on{background:var(--down)} .chip.dir-WATCH.on{background:var(--watch)}
  .chip.gold.on{background:var(--gold)}
  .chip:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

  .risk{margin-top:12px; font-size:11px; color:var(--tsec); font-family:var(--mono); background:var(--navy);
    border:1px solid var(--navy2); border-radius:9px; padding:9px 12px; line-height:1.6}
  .risk .warn{color:var(--loss)} .risk b{color:var(--tprimary)}

  .submit{width:100%; margin-top:14px; border:none; background:var(--gold); color:var(--bg); font-weight:900; font-size:16px;
    padding:15px; border-radius:12px; cursor:pointer; font-family:inherit}
  .submit:disabled{background:var(--navy2); color:var(--tmuted); cursor:not-allowed}
  .submit:not(:disabled):active{transform:translateY(1px)}

  .disc{margin:16px 4px 4px; font-size:9.5px; color:var(--tmuted); line-height:1.5; text-align:center}

  /* result */
  .res-head{display:flex; align-items:flex-end; justify-content:space-between; padding:6px 4px 2px}
  .res-reason{font-size:13px; font-weight:800}
  .res-pts{font-family:var(--mono); font-weight:900; font-size:30px; line-height:1}
  .res-sub{font-family:var(--mono); font-size:12px; margin-top:3px}
  .up{color:var(--profit)} .dn{color:var(--loss)} .flat{color:var(--tsec)}
  .badges{display:flex; gap:6px; margin:10px 0 4px; flex-wrap:wrap}
  .badge{font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px; font-family:var(--mono)}
  .badge.stop{background:rgba(229,72,77,.16); color:var(--loss); border:1px solid rgba(229,72,77,.4)}
  .badge.take{background:rgba(53,196,106,.16); color:var(--profit); border:1px solid rgba(53,196,106,.4)}
  .badge.dir{background:var(--navy2); color:var(--tsec)}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px}
  .cell{background:var(--navy); border:1px solid var(--navy2); border-radius:9px; padding:9px 11px}
  .cell .k{font-size:10px; color:var(--tmuted)}
  .cell .v{font-family:var(--mono); font-weight:700; font-size:14px; margin-top:2px}
  .reveal{margin-top:12px; background:var(--navy); border:1px solid var(--navy2); border-radius:11px; padding:13px}
  .reveal .sym{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .reveal .sym b{color:var(--gold); font-weight:800; font-size:15px}
  .reveal .sym .meta{font-size:10px; color:var(--tmuted); font-family:var(--mono)}
  .reveal .tags{display:flex; gap:5px; flex-wrap:wrap; margin:9px 0}
  .reveal .tags span{font-size:10px; color:var(--tsec); background:var(--navy2); padding:2px 8px; border-radius:6px}
  .reveal .ex{font-size:12px; color:var(--tsec); line-height:1.65}
  .res-btns{display:flex; gap:8px; margin-top:14px}
  .res-btns button{flex:1; border:none; padding:14px; border-radius:11px; font-weight:800; font-size:14px; cursor:pointer; font-family:inherit}
  .btn-next{background:var(--gold); color:var(--bg)}
  .btn-retry{background:var(--navy2); color:var(--tsec)}
  .res-btns button:active{transform:translateY(1px)}
  .btn-share{width:100%; border:none; padding:13px; border-radius:11px; font-weight:800; font-size:14px; cursor:pointer; font-family:inherit; margin-top:14px; color:#fff; background:linear-gradient(90deg,#2f6fd0,#4CA9FF); box-shadow:0 8px 22px -8px rgba(76,169,255,.6)}
  .btn-share:active{transform:translateY(1px)}
  .foot{display:flex; justify-content:center; gap:16px; margin-top:12px; font-size:10px; color:var(--tmuted); font-family:var(--mono)}
  .hidden{display:none}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>

<script>
const PROBLEMS = (window.CHARTS&&window.CHARTS.length)?window.CHARTS.map(function(c){c.candles=c.cs;return c;}):[];
(function(){
"use strict";
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
const $ = (id)=>document.getElementById(id);

/* ---------- persistence ---------- */
const LS='chartarena_web_v1';
function loadS(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}} }
function saveS(s){ try{localStorage.setItem(LS,JSON.stringify(s))}catch(e){} }
let store = Object.assign({balance:10000, played:0, wins:0, losses:0, best:0}, loadS());
let ind = Object.assign({volume:true, ma:true, boll:false, rsi:false, macd:false, ichi:false}, store.ind||{});

/* ---------- deterministic-ish shuffle (browser Math.random ok) ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let order = shuffle(PROBLEMS.map((_,i)=>i));
let qi=0;

/* ---------- state ---------- */
const LEVS=[1,2,3,5,10];
const WAGERS=[500,1000,2000,5000];
const STOPS=[{l:'없음',v:null},{l:'3%',v:3},{l:'5%',v:5},{l:'10%',v:10}];
const TAKES=[{l:'없음',v:null},{l:'5%',v:5},{l:'10%',v:10},{l:'20%',v:20}];
const HORS=[5,10,30];
let P, sel, phase, revealed, outcome, revealTimer=null;

function curProblem(){ return PROBLEMS[order[qi%order.length]]; }

function resetSel(){
  sel={dir:null, lev:1, wager:1000, stop:null, take:null, horizon:30};
  if(sel.wager>store.balance) sel.wager = Math.max(0, store.balance);
}

/* ---------- number fmt ---------- */
const fmtP=(v)=>{ const a=Math.abs(v); if(a>=1000) return v.toLocaleString(undefined,{maximumFractionDigits:0}); if(a>=1) return v.toFixed(2); return Number(v.toPrecision(4)).toString(); };
const pct=(v)=>(v>=0?'+':'')+v.toFixed(2)+'%';
const signCls=(v)=> v>0?'up':(v<0?'dn':'flat');

/* ---------- GameEngine port (faithful to GameEngine.kt) ---------- */
function evaluate(prob, d){
  const C=prob.candles, vis=Math.min(Math.max(prob.vis,1),C.length), entryIdx=vis-1, entry=C[entryIdx][3];
  const availableFuture=C.length-vis, horizon=Math.min(Math.max(d.horizon,0),availableFuture);
  const future = horizon>0 ? C.slice(vis, vis+horizon) : [];
  let maxUp=0,maxDown=0;
  for(const c of future){ const up=(c[1]-entry)/entry*100, dn=(c[2]-entry)/entry*100; if(up>maxUp)maxUp=up; if(dn<maxDown)maxDown=dn; }
  const endClose = future.length ? future[future.length-1][3] : entry;
  const marketEnd=(endClose-entry)/entry*100;
  if(d.dir==='WATCH' || horizon===0 || entry<=0){
    return {dir:d.dir,lev:Math.max(1,d.lev),wager:d.wager,entry,exit:endClose,reason:'NO_POSITION',offset:horizon,raw:0,levret:0,points:0,maxUp,maxDown,marketEnd,hitStop:false,hitTake:false};
  }
  const long=d.dir==='LONG', lev=Math.max(1,d.lev);
  const liqPct=100/lev;
  const userStop=(d.stop&&d.stop>0)?d.stop:null;
  const effStop=Math.min(userStop==null?Infinity:userStop, liqPct);
  const stopIsLiq=userStop==null || userStop>=liqPct;
  const stopPrice= long? entry*(1-effStop/100) : entry*(1+effStop/100);
  const takePrice=(d.take&&d.take>0)?(long?entry*(1+d.take/100):entry*(1-d.take/100)):null;
  let exit=endClose, reason='HORIZON_END', offset=horizon, hitStop=false, hitTake=false;
  for(let k=0;k<future.length;k++){ const c=future[k];
    const adverse= long? c[2]<=stopPrice : c[1]>=stopPrice;
    const favor= takePrice!=null && (long? c[1]>=takePrice : c[2]<=takePrice);
    if(adverse){ exit=stopPrice; reason= stopIsLiq?'LIQUIDATION':'STOP_LOSS'; offset=k+1; hitStop=true; break; }
    else if(favor){ exit=takePrice; reason='TAKE_PROFIT'; offset=k+1; hitTake=true; break; }
  }
  const sign=long?1:-1, raw=sign*(exit-entry)/entry*100, levret=Math.max(-100, raw*lev), points=Math.round(d.wager*levret/100);
  return {dir:d.dir,lev,wager:d.wager,entry,exit,reason,offset,raw,levret,points,maxUp,maxDown,marketEnd,hitStop,hitTake};
}
const REASON_KO={TAKE_PROFIT:'익절 도달',STOP_LOSS:'손절 도달',LIQUIDATION:'청산 💥',HORIZON_END:'기간 종료',NO_POSITION:'관망'};
const DIR_KO={LONG:'롱',SHORT:'숏',WATCH:'관망'};

/* ---------- chart ---------- */
const cv=$('chart'), ctx=cv.getContext('2d');
let cssW=0, cssH=0;
let view={count:60, start:0};   // count = candles shown (zoom), start = leftmost index (pan)
function sizeCanvas(){
  const r=cv.getBoundingClientRect(); const dpr=window.devicePixelRatio||1;
  cssW=r.width; cssH=r.height;
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
/* ---------- indicators (ported from Indicators.kt / Ichimoku.kt; computed over the REVEALED slice → leak-free) ---------- */
function smaArr(v,period){ const out=new Array(v.length).fill(null); let s=0;
  for(let i=0;i<v.length;i++){ s+=v[i]; if(i>=period)s-=v[i-period]; if(i>=period-1)out[i]=s/period; } return out; }
function emaArr(v,period){ const out=new Array(v.length).fill(null);
  if(period<=0||v.length<period) return out; const k=2/(period+1); let prev=0;
  for(let i=0;i<period;i++) prev+=v[i]; prev/=period; out[period-1]=prev;
  for(let i=period;i<v.length;i++){ prev=(v[i]-prev)*k+prev; out[i]=prev; } return out; }
function rsiV(ag,al){ if(al===0) return ag===0?50:100; const rs=ag/al; return 100-100/(1+rs); }
function rsiArr(cl,period){ period=period||14; const out=new Array(cl.length).fill(null);
  if(cl.length<=period) return out; let g=0,l=0;
  for(let i=1;i<=period;i++){ const c=cl[i]-cl[i-1]; if(c>=0)g+=c; else l-=c; }
  let ag=g/period, al=l/period; out[period]=rsiV(ag,al);
  for(let i=period+1;i<cl.length;i++){ const c=cl[i]-cl[i-1]; const gg=c>0?c:0, ll=c<0?-c:0;
    ag=(ag*(period-1)+gg)/period; al=(al*(period-1)+ll)/period; out[i]=rsiV(ag,al); } return out; }
function bollArr(v,period,k){ period=period||20; k=k||2; const mid=smaArr(v,period);
  const up=new Array(v.length).fill(null), lo=new Array(v.length).fill(null);
  for(let i=0;i<v.length;i++){ const m=mid[i]; if(m==null)continue; let ss=0;
    for(let j=i-period+1;j<=i;j++){ const d=v[j]-m; ss+=d*d; } const sd=Math.sqrt(ss/period);
    up[i]=m+k*sd; lo[i]=m-k*sd; } return {up,mid,lo}; }
function macdArr(v){ const ef=emaArr(v,12), es=emaArr(v,26);
  const macd=v.map((_,i)=> (ef[i]!=null&&es[i]!=null)? ef[i]-es[i]:null);
  const first=macd.findIndex(x=>x!=null); const signal=new Array(v.length).fill(null);
  if(first>=0){ const compact=macd.slice(first).map(x=>x==null?0:x); const e=emaArr(compact,9);
    for(let j=0;j<e.length;j++) signal[first+j]=e[j]; }
  const hist=v.map((_,i)=> (macd[i]!=null&&signal[i]!=null)? macd[i]-signal[i]:null);
  return {macd,signal,hist}; }
function ichiArr(cand){ const n=cand.length;
  const mid=(period,i)=>{ if(i<period-1)return null; let hi=-Infinity,lo=Infinity;
    for(let j=i-period+1;j<=i;j++){ if(cand[j][1]>hi)hi=cand[j][1]; if(cand[j][2]<lo)lo=cand[j][2]; } return (hi+lo)/2; };
  const tenkan=[],kijun=[],spanA=[],spanB=[];
  for(let i=0;i<n;i++){ const t=mid(9,i), k=mid(26,i); tenkan[i]=t; kijun[i]=k;
    spanA[i]=(t!=null&&k!=null)?(t+k)/2:null; spanB[i]=mid(52,i); }
  return {tenkan,kijun,spanA,spanB,disp:26}; }

/* ---------- pane layout (deterministic from active indicators) ---------- */
function layout(){
  const top=10, gap=8, bottom=8;
  const volH= ind.volume?50:0, rsiH= ind.rsi?60:0, macdH= ind.macd?60:0;
  const gaps=(volH?1:0)+(rsiH?1:0)+(macdH?1:0);
  let priceH=(cssH||280)-top-bottom-volH-rsiH-macdH-gaps*gap; if(priceH<150)priceH=150;
  let y=top; const L={};
  L.priceTop=y; y+=priceH; L.priceBot=y;
  if(volH){ y+=gap; L.volTop=y; y+=volH; L.volBot=y; } else { L.volTop=L.volBot=L.priceBot; }
  if(rsiH){ y+=gap; L.rsiTop=y; y+=rsiH; L.rsiBot=y; }
  if(macdH){ y+=gap; L.macdTop=y; y+=macdH; L.macdBot=y; }
  L.bottomAll=y; L.totalH=y+bottom;
  L.hasVol=!!volH; L.hasRsi=!!rsiH; L.hasMacd=!!macdH;
  return L;
}
function layoutCanvas(){ const L=layout(); cv.style.height=L.totalH+'px'; sizeCanvas(); return L; }

/* ---------- viewport (zoom/pan) ---------- */
function clampView(){ const total=P.candles.length;
  view.count=Math.max(20, Math.min(view.count, total));
  view.start=Math.max(0, Math.min(view.start, total-view.count)); }
function setViewRecent(){ const total=P.candles.length;
  view.count=Math.min(view.count||60, total);
  const right=(P.vis-1)+Math.min(P.fut, 8);          // entry + a few reserved future slots on the right
  view.start=right-view.count+1; clampView(); }
function zoomBy(factor, anchorFrac){ const total=P.candles.length;
  const f=(anchorFrac==null?0.5:anchorFrac);
  const anchor=view.start+f*view.count;              // candle index under the anchor point
  view.count=Math.max(20, Math.min(view.count*factor, total));
  view.start=anchor-f*view.count; clampView(); drawChart(); }

function drawChart(){
  if(!cssW) layoutCanvas();
  const L=layout(), W=cssW; ctx.clearRect(0,0,cssW,cssH);
  const C=P.candles, total=C.length, vis=P.vis;
  const axisW=52, padL=8, plotR=W-axisW;
  const priceTop=L.priceTop, priceBot=L.priceBot;
  clampView();
  const cw=(plotR-padL)/view.count;
  const cx=(i)=>padL+cw*(i - view.start + 0.5);
  // visible revealed range [v0,v1); padded [l0,l1) for smooth line edges
  const v0=Math.max(0, Math.floor(view.start));
  const v1=Math.min(revealed, Math.ceil(view.start+view.count));
  const l0=Math.max(0, v0-1), l1=Math.min(revealed, v1+1);

  // indicators over revealed slice only (leak-free)
  const rc=C.slice(0,revealed), closes=rc.map(c=>c[3]);
  const maDefs=[{p:5,col:'#FFD54A'},{p:20,col:'#4CC3FF'},{p:60,col:'#B980FF'},{p:200,col:'#FF8FB0'}];
  const mas= ind.ma? maDefs.map(m=>({col:m.col, arr:smaArr(closes,m.p)})):[];
  const boll= ind.boll? bollArr(closes,20,2):null;
  const ichi= ind.ichi? ichiArr(rc):null;
  const rsi= ind.rsi? rsiArr(closes,14):null;
  const mac= ind.macd? macdArr(closes):null;

  // autoscale price over the VISIBLE window (+ overlays in view) → zoomed swings fill the pane
  let lo=Infinity,hi=-Infinity,vmax=0;
  for(let i=v0;i<v1;i++){ if(C[i][2]<lo)lo=C[i][2]; if(C[i][1]>hi)hi=C[i][1]; if(C[i][4]>vmax)vmax=C[i][4]; }
  if(!isFinite(lo)){ const e=C[Math.max(0,revealed-1)]; lo=e[2]; hi=e[1]; }
  const ext=(x)=>{ if(x!=null){ if(x<lo)lo=x; if(x>hi)hi=x; } };
  if(boll) for(let i=v0;i<v1;i++){ ext(boll.up[i]); ext(boll.lo[i]); }
  if(ichi) for(let i=v0;i<v1;i++){ ext(ichi.spanA[i]); ext(ichi.spanB[i]); ext(ichi.tenkan[i]); ext(ichi.kijun[i]); }
  for(const m of mas) for(let i=v0;i<v1;i++) ext(m.arr[i]);
  const pad=(hi-lo)*0.08||hi*0.01||1; lo-=pad; hi+=pad;
  const yOf=(p)=>priceBot-(p-lo)/(hi-lo)*(priceBot-priceTop);
  const vyOf=(v)=>L.volBot-(v/(vmax||1))*(L.volBot-L.volTop);

  ctx.font='10px '+getComputedStyle(document.body).fontFamily;
  ctx.textBaseline='middle'; ctx.textAlign='left';
  for(let g=0;g<=4;g++){ const py=priceTop+(priceBot-priceTop)*g/4; const price=hi-(hi-lo)*g/4;
    ctx.strokeStyle='#1B2436'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,py); ctx.lineTo(plotR,py); ctx.stroke();
    ctx.fillStyle='#5A6478'; ctx.fillText(fmtP(price), plotR+5, py); }

  // hidden-future shade (only if the reveal boundary is within view)
  if(revealed<total && revealed<view.start+view.count){ const sx=Math.max(padL, cx(revealed)-cw/2);
    ctx.fillStyle='rgba(233,185,73,0.05)'; ctx.fillRect(sx,priceTop,plotR-sx,L.bottomAll-priceTop);
    ctx.strokeStyle='rgba(233,185,73,0.3)'; ctx.setLineDash([3,4]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx,priceTop); ctx.lineTo(sx,L.bottomAll); ctx.stroke(); ctx.setLineDash([]); }

  // ichimoku cloud (forward +26), only segments overlapping the view
  if(ichi){ for(let i=51;i<revealed-1;i++){ const j=i+ichi.disp; if(j+1>total-1) break;
      if(j+1<view.start-1 || j>view.start+view.count+1) continue;
      const a1=ichi.spanA[i],b1=ichi.spanB[i],a2=ichi.spanA[i+1],b2=ichi.spanB[i+1];
      if(a1==null||b1==null||a2==null||b2==null) continue;
      const x1=cx(j),x2=cx(j+1);
      ctx.beginPath(); ctx.moveTo(x1,yOf(a1)); ctx.lineTo(x2,yOf(a2)); ctx.lineTo(x2,yOf(b2)); ctx.lineTo(x1,yOf(b1)); ctx.closePath();
      ctx.fillStyle=((a1+a2)>=(b1+b2))?'rgba(53,196,106,0.16)':'rgba(229,72,77,0.16)'; ctx.fill(); } }

  // volume (visible)
  if(L.hasVol){ for(let i=v0;i<v1;i++){ const c=C[i]; const up=c[3]>=c[0];
      ctx.fillStyle= up?'rgba(240,97,109,.5)':'rgba(76,141,246,.5)'; const bw=Math.max(1,cw*0.66);
      ctx.fillRect(cx(i)-bw/2, vyOf(c[4]), bw, L.volBot-vyOf(c[4])); }
    ctx.fillStyle='#5A6478'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('거래량', padL+2, L.volTop+2); }

  // candles (visible) — thicker with zoom
  for(let i=v0;i<v1;i++){ const c=C[i]; const up=c[3]>=c[0]; const col= up?'#F0616D':'#4C8DF6';
    const x=cx(i); ctx.strokeStyle=col; ctx.lineWidth=Math.max(1,cw*0.13); ctx.beginPath(); ctx.moveTo(x,yOf(c[1])); ctx.lineTo(x,yOf(c[2])); ctx.stroke();
    const bw=Math.max(1.5,cw*0.72); const yo=yOf(c[0]), yc=yOf(c[3]);
    ctx.fillStyle=col; ctx.fillRect(x-bw/2, Math.min(yo,yc), bw, Math.max(1,Math.abs(yc-yo))); }

  // polyline helper over padded visible range
  const plot=(arr,col,w)=>{ ctx.strokeStyle=col; ctx.lineWidth=w||1.3; ctx.beginPath(); let st=false;
    for(let i=l0;i<l1;i++){ const v=arr[i]; if(v==null){st=false;continue;} const x=cx(i),y=yOf(v);
      if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke(); };

  for(const m of mas) plot(m.arr, m.col, 1.4);
  if(boll){ plot(boll.up,'#5AA9E6',1); plot(boll.lo,'#5AA9E6',1); ctx.setLineDash([3,3]); plot(boll.mid,'#7C8AA5',1); ctx.setLineDash([]); }
  if(ichi){ plot(ichi.tenkan,'#2BD4C4',1.2); plot(ichi.kijun,'#E0679F',1.2);
    ctx.strokeStyle='#9AA7BD'; ctx.lineWidth=1; ctx.beginPath(); let st=false;
    for(let i=Math.max(26,l0+26);i<Math.min(revealed,l1+26);i++){ const x=cx(i-26),y=yOf(closes[i]); if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke(); }

  // active-overlay legend (price pane, bottom-left)
  { let lx=padL+2, ly=priceBot-11; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.font='9px '+getComputedStyle(document.body).fontFamily;
    const leg=[]; if(ind.ma) leg.push(['MA5','#FFD54A'],['20','#4CC3FF'],['60','#B980FF'],['200','#FF8FB0']);
    if(ind.boll) leg.push(['BB','#5AA9E6']); if(ind.ichi) leg.push(['전환','#2BD4C4'],['기준','#E0679F'],['구름','#35C46A']);
    for(const t of leg){ ctx.fillStyle=t[1]; ctx.fillText(t[0],lx,ly); lx+=ctx.measureText(t[0]).width+7; } }

  // entry line (horizontal always; vertical only if entry in view)
  const entry=C[vis-1][3];
  ctx.strokeStyle='rgba(233,185,73,.55)'; ctx.setLineDash([4,3]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(padL,yOf(entry)); ctx.lineTo(plotR,yOf(entry)); ctx.stroke();
  if(vis-1>=view.start-1 && vis-1<=view.start+view.count){ const exx=cx(vis-1);
    ctx.beginPath(); ctx.moveTo(exx,priceTop); ctx.lineTo(exx,L.bottomAll); ctx.stroke(); }
  ctx.setLineDash([]);
  tagPrice(ctx, plotR, yOf(entry), '진입 '+fmtP(entry), '#E9B949', '#080B14');

  // stop/take preview (bet phase)
  if(phase==='bet' && sel.dir && sel.dir!=='WATCH'){
    const long=sel.dir==='LONG'; const liq=100/Math.max(1,sel.lev);
    const eff=Math.min(sel.stop==null?Infinity:sel.stop, liq);
    const sp= long? entry*(1-eff/100): entry*(1+eff/100); const isLiq= sel.stop==null || sel.stop>=liq;
    if(sp>lo&&sp<hi){ line(ctx,padL,plotR,yOf(sp),'#E5484D'); tagPrice(ctx,plotR,yOf(sp),(isLiq?'청산 ':'손절 ')+fmtP(sp),'#E5484D','#fff'); }
    if(sel.take){ const tp= long? entry*(1+sel.take/100): entry*(1-sel.take/100); if(tp>lo&&tp<hi){ line(ctx,padL,plotR,yOf(tp),'#35C46A'); tagPrice(ctx,plotR,yOf(tp),'익절 '+fmtP(tp),'#35C46A','#062'); } } }
  // exit marker (result)
  if(phase==='result' && outcome && outcome.reason!=='NO_POSITION'){
    const oy=yOf(outcome.exit); const oxi=vis-1+outcome.offset;
    line(ctx,padL,plotR,oy, outcome.points>=0?'#35C46A':'#E5484D');
    if(oxi>=view.start-1 && oxi<=view.start+view.count){ const ox=cx(Math.min(oxi,total-1)); ctx.fillStyle= outcome.points>=0?'#35C46A':'#E5484D'; ctx.beginPath(); ctx.arc(ox,oy,3.5,0,7); ctx.fill(); } }

  // RSI pane
  if(rsi && L.hasRsi){ const t=L.rsiTop,b=L.rsiBot, ry=(v)=> b-(v/100)*(b-t);
    ctx.setLineDash([3,3]);
    ctx.strokeStyle='rgba(229,72,77,.4)'; ctx.beginPath(); ctx.moveTo(padL,ry(70)); ctx.lineTo(plotR,ry(70)); ctx.stroke();
    ctx.strokeStyle='rgba(53,196,106,.4)'; ctx.beginPath(); ctx.moveTo(padL,ry(30)); ctx.lineTo(plotR,ry(30)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle='#C9B458'; ctx.lineWidth=1.2; ctx.beginPath(); let st=false;
    for(let i=l0;i<l1;i++){ const v=rsi[i]; if(v==null){st=false;continue;} const x=cx(i),y=ry(v); if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke();
    ctx.fillStyle='#5A6478'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('RSI 14',padL+2,t+2);
    ctx.textBaseline='middle'; ctx.fillText('70',plotR+5,ry(70)); ctx.fillText('30',plotR+5,ry(30)); }

  // MACD pane
  if(mac && L.hasMacd){ const t=L.macdTop,b=L.macdBot, mid=(t+b)/2;
    let mm=1e-9; for(let i=v0;i<v1;i++){ [mac.macd[i],mac.signal[i],mac.hist[i]].forEach(v=>{ if(v!=null&&Math.abs(v)>mm)mm=Math.abs(v); }); }
    const my=(v)=> mid-(v/mm)*((b-t)/2*0.86);
    ctx.strokeStyle='#1B2436'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,mid); ctx.lineTo(plotR,mid); ctx.stroke();
    for(let i=v0;i<v1;i++){ const h=mac.hist[i]; if(h==null)continue; const x=cx(i), bw=Math.max(1,cw*0.66);
      ctx.fillStyle= h>=0?'rgba(53,196,106,.6)':'rgba(229,72,77,.6)'; const y0=my(0),y1=my(h); ctx.fillRect(x-bw/2,Math.min(y0,y1),bw,Math.max(1,Math.abs(y1-y0))); }
    const plotM=(arr,col)=>{ ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.beginPath(); let st=false;
      for(let i=l0;i<l1;i++){ const v=arr[i]; if(v==null){st=false;continue;} const x=cx(i),y=my(v); if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke(); };
    plotM(mac.macd,'#4C8DF6'); plotM(mac.signal,'#E9A23B');
    ctx.fillStyle='#5A6478'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('MACD 12·26·9',padL+2,t+2); }
}
function line(ctx,x1,x2,y,col){ ctx.strokeStyle=col; ctx.setLineDash([4,3]); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke(); ctx.setLineDash([]); }
function tagPrice(ctx,xRight,y,txt,bg,fg){ ctx.font='9px '+getComputedStyle(document.body).fontFamily; const w=ctx.measureText(txt).width+8;
  ctx.fillStyle=bg; const yy=Math.max(8,Math.min(y,cssH-8)); roundRect(ctx,xRight-w-1,yy-7,w,14,3); ctx.fill(); ctx.fillStyle=fg; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(txt,xRight-w+3,yy); }
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ---------- controls build ---------- */
function chipGroup(host, items, isOn, onPick){
  host.innerHTML='';
  items.forEach(it=>{ const el=document.createElement('div'); el.className='chip gold'+(isOn(it.val)?' on':''); el.tabIndex=0;
    el.innerHTML=it.html; const act=()=>onPick(it.val);
    el.addEventListener('click',act); el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}});
    host.appendChild(el); });
}
function buildControls(){
  chipGroup($('levRow'), LEVS.map(v=>({val:v,html:v+'배'})), it=>sel.lev===it, v=>{sel.lev=v; sync();});
  chipGroup($('wagerRow'), WAGERS.map(v=>({val:v,html:v.toLocaleString()+'P'})), it=>sel.wager===it, v=>{sel.wager=v; sync();});
  chipGroup($('stopRow'), STOPS.map(s=>({val:s.v,html:s.l})), it=>sel.stop===it, v=>{sel.stop=v; sync();});
  chipGroup($('takeRow'), TAKES.map(s=>({val:s.v,html:s.l})), it=>sel.take===it, v=>{sel.take=v; sync();});
  chipGroup($('horRow'), HORS.map(v=>({val:v,html:v+'캔들'})), it=>sel.horizon===it, v=>{sel.horizon=v; sync();});
}
function buildDir(){
  document.querySelectorAll('#dirRow .chip').forEach(el=>{
    el.classList.toggle('on', sel.dir===el.dataset.dir);
    el.onclick=()=>{ sel.dir=el.dataset.dir; sync(); };
    el.onkeydown=(e)=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault(); sel.dir=el.dataset.dir; sync();} };
  });
}

/* ---------- indicator toggles ---------- */
const IND=[
  {k:'volume',label:'거래량',col:'#8A93A6'},
  {k:'ma',label:'이평선',col:'#4CC3FF'},
  {k:'boll',label:'볼린저',col:'#5AA9E6'},
  {k:'rsi',label:'RSI',col:'#C9B458'},
  {k:'macd',label:'MACD',col:'#4C8DF6'},
  {k:'ichi',label:'일목',col:'#2BD4C4'},
];
function buildIndBar(){ const host=$('indbar'); host.innerHTML='';
  IND.forEach(it=>{ const el=document.createElement('div'); el.className='itog'+(ind[it.k]?' on':''); el.tabIndex=0;
    el.innerHTML='<span class="dot" style="background:'+(ind[it.k]?it.col:'#5A6478')+'"></span>'+it.label;
    const act=()=>{ ind[it.k]=!ind[it.k]; store.ind=ind; saveS(store); buildIndBar(); layoutCanvas(); drawChart(); };
    el.addEventListener('click',act); el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}});
    host.appendChild(el); });
}

/* ---------- risk text + submit state ---------- */
function sync(){
  buildDir(); buildControls();
  $('posOnly').style.opacity = (sel.dir==='WATCH')?'.4':'1';
  const liq=(100/Math.max(1,sel.lev));
  let r='';
  if(sel.dir==='WATCH'){ r='관망: 포지션 없이 다음 흐름을 지켜봅니다. <b>포인트 변동 없음.</b>'; }
  else if(!sel.dir){ r='방향을 선택하면 리스크가 표시됩니다.'; }
  else{
    r=`최대 손실 <b>-${sel.wager.toLocaleString()}P</b> · 청산선 역방향 <b>${liq.toFixed(liq<10?1:0)}%</b>`;
    if(sel.lev>=10) r+=' <span class="warn">⚠ 초고배율: 작은 역행에도 청산</span>';
    else if(sel.lev>=5) r+=' <span class="warn">⚠ 고배율 주의</span>';
  }
  $('risk').innerHTML=r;
  const over = sel.dir!=='WATCH' && sel.wager>store.balance;
  const btn=$('submitBtn');
  if(!sel.dir){ btn.disabled=true; btn.textContent='방향을 선택하세요'; }
  else if(over){ btn.disabled=true; btn.textContent='포인트 부족'; }
  else if(store.balance<=0 && sel.dir!=='WATCH'){ btn.disabled=true; btn.textContent='포인트 부족'; }
  else { btn.disabled=false; btn.textContent= sel.dir==='WATCH'?'관망 제출':'제출하기'; }
  if(phase==='bet') drawChart();
}

/* ---------- phases ---------- */
function loadProblem(){
  P=curProblem(); resetSel(); phase='bet'; revealed=P.vis; outcome=null;
  $('betPane').classList.remove('hidden'); $('resPane').classList.add('hidden');
  $('qtag').textContent='문제 '+(qi+1);
  $('bal').textContent=store.balance.toLocaleString()+'P';
  const d=P.diff; $('diff').textContent='난이도 '+'●'.repeat(d)+'○'.repeat(5-d);
  $('hiddenTag').classList.remove('hidden');
  layoutCanvas(); setViewRecent(); sync(); drawChart();
  document.querySelector('.scroll').scrollTop=0;
}
function submit(){
  outcome=evaluate(P, sel); phase='reveal';
  $('submitBtn').disabled=true;
  const target=P.vis+Math.min(sel.horizon, P.candles.length-P.vis);
  if(reduce){ revealed=target; finishReveal(); return; }
  clearInterval(revealTimer);
  const iv=(target-revealed)>15?55:90;   // faster tick for long (30캔들) reveals
  revealTimer=setInterval(()=>{ revealed++;
    if(revealed-1 >= view.start+view.count-2){ view.start = (revealed - view.count + 2); clampView(); }  // follow the newest candle
    drawChart(); if(revealed>=target){ clearInterval(revealTimer); finishReveal(); } }, iv);
}
function finishReveal(){
  phase='result'; $('hiddenTag').classList.add('hidden'); drawChart(); renderResult();
  $('betPane').classList.add('hidden'); $('resPane').classList.remove('hidden');
  document.querySelector('.scroll').scrollTop=0;
}
function renderResult(){
  const o=outcome;
  $('rReason').textContent=REASON_KO[o.reason]; $('rReason').className='res-reason '+(o.points>0?'up':o.points<0?'dn':'flat');
  $('rPts').textContent=(o.points>0?'+':'')+o.points.toLocaleString(); $('rPts').className='res-pts '+signCls(o.points);
  $('rRet').innerHTML= o.reason==='NO_POSITION' ? '<span class="flat">포지션 없음</span>'
    : `<span class="${signCls(o.levret)}">${pct(o.levret)}</span> <span class="flat">(${sel.lev}배 · 원수익 ${pct(o.raw)})</span>`;
  // badges
  const b=[]; b.push(`<span class="badge dir">${DIR_KO[o.dir]}${o.dir!=='WATCH'?' '+o.lev+'배':''}</span>`);
  if(o.hitTake) b.push('<span class="badge take">익절 적중</span>');

  $('rBadges').innerHTML=b.join('');
  $('rEntry').textContent=fmtP(o.entry); $('rExit').textContent=fmtP(o.exit);
  $('rMax').innerHTML=`<span class="up">${pct(o.maxUp)}</span> / <span class="dn">${pct(o.maxDown)}</span>`;
  const availFut=P.candles.length-P.vis, hz=Math.min(sel.horizon,availFut);
  $('rMktK').textContent=`${hz}캔들 시장수익률`+(hz<sel.horizon?' (가용)':'');
  $('rMkt').innerHTML=`<span class="${signCls(o.marketEnd)}">${pct(o.marketEnd)}</span>`;
  $('rSym').textContent=P.symbol; $('rPeriod').textContent=`${P.tf} · ${P.period} · ${P.source}`;
  $('rTags').innerHTML=P.tags.map(t=>`<span>${t}</span>`).join('');
  $('rEx').textContent=P.explain;
  $('fPlayed').textContent=store.played+'판';
  $('fWin').textContent= (store.wins+store.losses)>0 ? '승률 '+Math.round(store.wins/(store.wins+store.losses)*100)+'%' : '승률 –';
  $('fBest').textContent= store.best>0?('최고 +'+store.best.toLocaleString()):'최고 –';
  // 인증짤 데이터
  var hub=_hub(), ch=(hub.equip&&hub.equip.ch)||'hu0';
  var kind=o.reason==='NO_POSITION'?'watch':(o.reason==='LIQUIDATION'?'liq':(o.levret>0?'profit':'loss'));
  var w0=Math.max(0,P.vis-1-40), win=P.candles.slice(w0,P.vis-1+o.offset+1);
  _cardData={ kind:kind, pct:o.reason==='NO_POSITION'?'관망':pct(o.levret), dirKo:DIR_KO[o.dir], lev:o.lev,
    sym:P.symbol, tf:P.tf, entry:fmtP(o.entry), exit:fmtP(o.exit), nick:hub.nick||'트레이더', chImg:chImgOf(ch),
    badge:kind==='liq'?'💥 청산':kind==='profit'?(o.levret>=50?'🚀 떡상 익절':'👍 익절 성공'):kind==='loss'?'💧 손실':'◎ 관망',
    meme:kind==='liq'?'청산… 지하실 구경 중 💀':kind==='profit'?(o.levret>=50?'떡상 익절! 우상향 고고 🚀':'익절 성공 👍'):kind==='loss'?'물렸다… 존버 각 💧':'관망도 실력 ◎',
    cs:win, entryIdx:Math.min(40,P.vis-1),

}
/* ===== 인증짤 (결과 공유 카드) ===== */
var _cardData=null, CFF="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif";
function _hub(){try{return JSON.parse(localStorage.getItem('chartarena_hub_v1'))||{};}catch(e){return{};}}
function chImgOf(ch){ if(!ch)return 'assets/hu0.png?v=2'; return (ch.indexOf('hu')===0||ch.indexOf('pet')===0)?'assets/'+ch+'.png?v=2':'assets/char_'+ch+'.png'; }
function symKo(s){var m={BTCUSDT:'비트코인',ETHUSDT:'이더리움',SOLUSDT:'솔라나',BNBUSDT:'BNB',XRPUSDT:'리플',DOGEUSDT:'도지코인',ADAUSDT:'에이다',LINKUSDT:'체인링크',AVAXUSDT:'아발란체',DOTUSDT:'폴카닷',LTCUSDT:'라이트코인'};return m[s]||s;}
function _rr(c,a,b,w,h,r){c.beginPath();c.moveTo(a+r,b);c.arcTo(a+w,b,a+w,b+h,r);c.arcTo(a+w,b+h,a,b+h,r);c.arcTo(a,b+h,a,b,r);c.arcTo(a,b,a+w,b,r);c.closePath();}
function _limg(src){return new Promise(function(res){if(!src){res(null);return;}var im=new Image();im.onload=function(){res(im);};im.onerror=function(){res(null);};im.src=src;});}
function _spark(x,d,acc,X,Y,W2,H2){ var cs=d.cs; if(!cs||cs.length<2)return; var cl=cs.map(function(c){return c[3];});
  var lo=Math.min.apply(null,cl),hi=Math.max.apply(null,cl),pad=(hi-lo)*.12||1;lo-=pad;hi+=pad; var n=cl.length;
  var xa=function(i){return X+i/(n-1)*W2;}, ya=function(v){return Y+H2-(v-lo)/(hi-lo)*H2;};
  x.beginPath();x.moveTo(xa(0),ya(cl[0]));for(var i=1;i<n;i++)x.lineTo(xa(i),ya(cl[i]));x.lineTo(xa(n-1),Y+H2);x.lineTo(xa(0),Y+H2);x.closePath();
  var ag=x.createLinearGradient(0,Y,0,Y+H2);ag.addColorStop(0,acc+'44');ag.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=ag;x.fill();
  x.beginPath();x.moveTo(xa(0),ya(cl[0]));for(var i=1;i<n;i++)x.lineTo(xa(i),ya(cl[i]));x.strokeStyle=acc;x.lineWidth=4;x.lineJoin='round';x.stroke();
  if(d.entryIdx!=null&&d.entryIdx>=0&&d.entryIdx<n){x.setLineDash([7,7]);x.strokeStyle='rgba(233,185,73,.75)';x.beginPath();x.moveTo(xa(d.entryIdx),Y);x.lineTo(xa(d.entryIdx),Y+H2);x.stroke();x.setLineDash([]);}
  x.fillStyle=acc;x.beginPath();x.arc(xa(n-1),ya(cl[n-1]),10,0,Math.PI*2);x.fill();x.strokeStyle='#fff';x.lineWidth=3;x.stroke(); }
function makeCard(d,cb){
  var W=1080,H=1080,C=document.createElement('canvas');C.width=W;C.height=H;var x=C.getContext('2d');
  var acc=d.kind==='liq'?'#FF4D5E':d.kind==='profit'?'#35D07A':d.kind==='loss'?'#FF7A9C':'#E9B949';
  Promise.all([_limg('assets/logo_wordmark.png'),_limg('assets/qr.png'),_limg(d.chImg)]).then(function(im){
    var logo=im[0],qr=im[1],av=im[2];
    var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0e1c3a');g.addColorStop(1,'#05070f');x.fillStyle=g;x.fillRect(0,0,W,H);
    var rg=x.createRadialGradient(W/2,470,60,W/2,470,660);rg.addColorStop(0,acc+'2e');rg.addColorStop(1,'rgba(5,7,15,0)');x.fillStyle=rg;x.fillRect(0,0,W,H);
    x.strokeStyle='rgba(120,150,200,.22)';x.lineWidth=3;_rr(x,22,22,W-44,H-44,34);x.stroke();
    if(logo){var lw=320,lh=lw*logo.height/logo.width;x.drawImage(logo,(W-lw)/2,64,lw,lh);}
    x.fillStyle='#9fb3d0';x.textAlign='center';x.font='600 25px '+CFF;x.fillText('실전처럼 배우는 차트 모의전 · 교육용(가상 포인트)',W/2,180);
    var ax=150,ay=248,ad=150;
    x.save();x.beginPath();x.arc(ax,ay+ad/2,ad/2,0,Math.PI*2);x.closePath();x.fillStyle='#0a1428';x.fill();x.clip();
    if(av){var sc=Math.max(ad/av.width,ad/av.height)*1.55,iw=av.width*sc,ih=av.height*sc;x.drawImage(av,ax-iw/2,ay+ad/2-ih*0.60,iw,ih);}
    x.restore();
    x.strokeStyle=acc;x.lineWidth=5;x.beginPath();x.arc(ax,ay+ad/2,ad/2,0,Math.PI*2);x.stroke();
    x.textAlign='left';x.fillStyle='#EAF0FA';x.font='900 48px '+CFF;x.fillText((d.nick||'트레이더').slice(0,10),ax+ad/2+34,ay+56);
    x.fillStyle=acc;x.font='800 30px '+CFF;x.fillText(d.badge,ax+ad/2+34,ay+104);
    x.textAlign='center';x.fillStyle=acc;x.font='900 172px '+CFF;x.fillText(d.pct,W/2,548);
    x.fillStyle='#EAF0FA';x.font='800 50px '+CFF;x.fillText(d.meme,W/2,628);
    x.fillStyle='#c7d5ea';x.font='700 34px '+CFF;x.fillText(symKo(d.sym)+'  '+d.tf+'   ·   '+d.dirKo+(d.dirKo!=='관망'?' '+d.lev+'배':''),W/2,700);
    x.fillStyle='#8ea6c8';x.font='600 27px '+CFF;x.fillText('진입 '+d.entry+'   →   종료 '+d.exit,W/2,742);
    _spark(x,d,acc,70,782,W-140,150);
    if(qr)x.drawImage(qr,60,H-192,142,142);
    x.textAlign='left';x.fillStyle='#dbe8fb';x.font='800 36px '+CFF;x.fillText('지금 도전 →',236,H-116);
    x.fillStyle='#7fb0ff';x.font='700 30px '+CFF;x.fillText('jansang18.github.io/chartarena-web',236,H-70);
    cb(C);
  });
}
function shareCard(d){ if(!d)return; makeCard(d,function(C){ C.toBlob(function(blob){ if(!blob)return;
  var file=new File([blob],'chartarena.png',{type:'image/png'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file],title:'차트아레나',text:d.shareText}).catch(function(){}); }
  else { var u=URL.createObjectURL(blob),a=document.createElement('a'); a.href=u; a.download='chartarena_인증.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(u);},2000); }
},'image/png'); }); }
(function(){ var sb=document.getElementById('shareBtn'); if(sb)sb.onclick=function(){ if(_cardData)shareCard(_cardData); }; })();
function commitNext(){
  const o=outcome;
  store.balance = Math.max(0, store.balance + o.points);
  store.played++;
  if(o.points>0){ store.wins++; if(o.points>store.best) store.best=o.points; }
  else if(o.points<0) store.losses++;
  saveS(store);
  qi++; if(qi>=order.length){ order=shuffle(PROBLEMS.map((_,i)=>i)); qi=0; }
  loadProblem();
}
function retry(){ // score-neutral
  phase='bet'; revealed=P.vis; outcome=null;
  $('betPane').classList.remove('hidden'); $('resPane').classList.add('hidden');
  $('hiddenTag').classList.remove('hidden');
  setViewRecent(); sync(); drawChart(); document.querySelector('.scroll').scrollTop=0;
}

/* ---------- wire ---------- */
$('submitBtn').addEventListener('click',()=>{ if(!$('submitBtn').disabled) submit(); });
$('nextBtn').addEventListener('click',commitNext);
$('retryBtn').addEventListener('click',retry);
let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ layoutCanvas(); drawChart(); },120); });

/* ---------- pan (drag) + zoom (wheel/pinch/buttons) ---------- */
function cwNow(){ return (cssW-52-8)/view.count; }   // axisW=52, padL=8
let dragging=false, dragX0=0, dragStart0=0;
const pointers=new Map();  // for pinch
cv.addEventListener('pointerdown',(e)=>{ pointers.set(e.pointerId,e); if(pointers.size===1){ dragging=true; dragX0=e.clientX; dragStart0=view.start; } });
window.addEventListener('pointermove',(e)=>{
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId,e);
  if(pointers.size>=2){ dragging=false; return; }      // pinch handled on pointerup delta below
  if(!dragging) return;
  view.start = dragStart0 - (e.clientX-dragX0)/cwNow(); clampView(); drawChart();
});
let pinchBase=null;
window.addEventListener('pointermove',(e)=>{
  if(pointers.size<2) { pinchBase=null; return; }
  const pts=[...pointers.values()]; const d=Math.abs(pts[0].clientX-pts[1].clientX)+Math.abs(pts[0].clientY-pts[1].clientY);
  if(pinchBase==null){ pinchBase={d, count:view.count}; return; }
  if(d>4){ view.count=Math.max(20, Math.min(pinchBase.count*(pinchBase.d/d), P.candles.length)); clampView(); drawChart(); }
});
function releasePtr(e){ pointers.delete(e.pointerId); if(pointers.size<2) pinchBase=null; if(pointers.size===0) dragging=false; }
window.addEventListener('pointerup',releasePtr); window.addEventListener('pointercancel',releasePtr);
cv.addEventListener('wheel',(e)=>{ e.preventDefault(); const rect=cv.getBoundingClientRect();
  const frac=Math.max(0,Math.min(1,(e.clientX-rect.left-8)/((cssW-52-8)||1)));
  zoomBy(e.deltaY>0?1.18:0.85, frac); }, {passive:false});
$('zoomIn').addEventListener('click',()=>zoomBy(0.78));
$('zoomOut').addEventListener('click',()=>zoomBy(1.28));
$('zoomReset').addEventListener('click',()=>{ view.count=60; setViewRecent(); drawChart(); });

buildIndBar();
loadProblem();
})();
</script>
