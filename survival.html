<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>차트아레나 · 서바이벌 최후의 1인</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b1020'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<style>
  :root{--bg:#0a0e1a;--p1:#111726;--p2:#0e1526;--line:#22304e;--txt:#e9eefc;--sub:#9fb0d0;--faint:#6b7a99;
    --up:#F0616D;--down:#4C8DF6;--green:#35D07A;--gold:#F5C451;--mono:ui-monospace,"Cascadia Mono",Consolas,monospace;
    --sans:"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:radial-gradient(120% 70% at 50% -10%,#16223f,#0a0e1a 55%);color:var(--txt);font-family:var(--sans);overflow:hidden}
  .app{width:min(100vw,calc(100vh*1120/620));aspect-ratio:1120/620;max-height:100vh;margin:0 auto;display:flex;flex-direction:column;position:relative}
  .top{display:flex;align-items:center;gap:10px;padding:12px 16px 8px}
  .top .home{text-decoration:none;color:var(--sub);font-size:12px;font-weight:700;background:var(--p1);border:1px solid var(--line);border-radius:9px;padding:6px 11px}
  .top .ti{font-weight:900;font-size:16px}.top .ti b{color:var(--gold)}
  .top .sp{flex:1}
  .alive{font-weight:900;font-family:var(--mono);font-size:15px;color:var(--green);background:rgba(53,208,122,.12);border:1px solid rgba(53,208,122,.4);border-radius:999px;padding:5px 13px}
  .alive .dead{color:var(--faint)}
  .body{flex:1;min-height:0;display:flex;gap:12px;padding:2px 16px 12px}
  .left{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
  .chartwrap{flex:1;min-height:0;position:relative;background:var(--p2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  canvas{width:100%;height:100%;display:block}
  .qbar{display:flex;align-items:center;gap:10px}
  .qbar .q{font-weight:900;font-size:16px}
  .qbar .timer{margin-left:auto;font-family:var(--mono);font-weight:900;font-size:20px;color:var(--gold)}
  .qbar .timer.hot{color:var(--up);animation:pulse .5s infinite alternate}
  @keyframes pulse{to{transform:scale(1.12)}}
  .oxrow{display:flex;gap:12px}
  .ox{flex:1;border:2px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;background:var(--p1);transition:.12s;user-select:none}
  .ox .oxi{font-size:30px;font-weight:900;line-height:1}
  .ox .oxt{font-weight:900;font-size:16px;margin-top:3px}
  .ox .oxs{font-size:11px;color:var(--sub)}
  .ox.o{border-color:rgba(240,97,109,.4)} .ox.x{border-color:rgba(76,141,246,.4)}
  .ox.o .oxi{color:var(--up)} .ox.x .oxi{color:var(--down)}
  .ox.o.sel{background:rgba(240,97,109,.16);border-color:var(--up);box-shadow:0 0 20px -6px var(--up)}
  .ox.x.sel{background:rgba(76,141,246,.16);border-color:var(--down);box-shadow:0 0 20px -6px var(--down)}
  .ox.disabled{opacity:.5;pointer-events:none}
  .ox.right{outline:3px solid var(--green);outline-offset:1px}
  .ox.wrong{outline:3px solid var(--up);outline-offset:1px;opacity:.6}
  /* 우측 참가자 그리드 */
  .right{width:280px;flex:none;display:flex;flex-direction:column;background:var(--p2);border:1px solid var(--line);border-radius:14px;padding:10px;overflow:hidden}
  .rhd{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .grid{flex:1;min-height:0;overflow-y:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;align-content:start;scrollbar-width:thin}
  .grid::-webkit-scrollbar{width:5px}.grid::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .pl{position:relative;border-radius:10px;background:#0c1424;border:1px solid #1c2a46;padding:4px 2px 3px;text-align:center;transition:.25s}
  .pl.me{border-color:var(--gold);background:rgba(245,196,81,.08)}
  .pl .av{width:100%;height:44px;object-fit:contain;object-position:bottom}
  .pl .nm{font-size:8.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .pl .pk{position:absolute;top:2px;right:3px;font-size:11px;font-weight:900}
  .pl .pk.O{color:var(--up)}.pl .pk.X{color:var(--down)}
  .pl.dead{opacity:.32;filter:grayscale(.9)}
  .pl.dead::after{content:"✕";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:var(--up);opacity:.85}
  .pl.win{border-color:var(--gold);box-shadow:0 0 18px -3px var(--gold)}
  /* 매칭 오버레이 */
  .ov{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(6,10,20,.92);backdrop-filter:blur(4px);text-align:center;padding:20px}
  .ov.on{display:flex}
  .mcard{width:min(92%,560px)}
  .mcard .mt{font-size:26px;font-weight:900}.mcard .mt b{color:var(--gold)}
  .mcard .msub{color:var(--sub);font-size:14px;margin-top:6px}
  .mcount{font-family:var(--mono);font-weight:900;font-size:20px;color:var(--green);margin:16px 0 10px}
  .mgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:8px}
  .mgrid .ms{aspect-ratio:1;border-radius:8px;background:#0c1424;border:1px solid #1c2a46;display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:.25;transition:.2s}
  .mgrid .ms.on{opacity:1;border-color:#2c3d61}
  .mgrid .ms img{width:100%;height:100%;object-fit:contain;object-position:bottom}
  .mbtn{margin-top:18px;border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:17px;color:#062018;background:linear-gradient(180deg,#48e58c,#25b061);border-radius:13px;padding:14px 30px}
  .mbtn:disabled{opacity:.5}
  /* 결과 */
  .rcard{width:min(92%,420px);background:radial-gradient(120% 90% at 50% 0%,#1c2a4a,#0e1424 60%,#0a0e1a);border:1px solid rgba(245,196,81,.4);border-radius:22px;padding:28px 24px 22px}
  .rcard .rr{font-size:52px;line-height:1}
  .rcard h2{font-size:24px;font-weight:900;margin:6px 0 2px}
  .rcard .rp{font-family:var(--mono);font-size:17px;color:var(--gold);font-weight:900}
  .rcard .rrew{margin-top:14px;background:rgba(76,141,246,.1);border:1px solid rgba(76,141,246,.35);border-radius:12px;padding:11px;color:#cfe0ff;font-size:14px;font-weight:700}
  .rcard .rbtns{display:flex;gap:10px;margin-top:18px}
  .rcard .rbtns button,.rcard .rbtns a{flex:1;text-decoration:none;text-align:center;border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:15px;border-radius:12px;padding:13px}
  .rbtns .again{color:#062018;background:linear-gradient(180deg,#48e58c,#25b061)}
  .rbtns .hub{color:var(--sub);background:var(--p1);border:1px solid var(--line)!important}
  .banner{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);z-index:25;font-weight:900;font-size:40px;pointer-events:none;opacity:0;transition:.3s;text-shadow:0 6px 24px #000}
  .banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .banner.o{color:var(--up)}.banner.x{color:var(--down)}
  .toast{position:absolute;left:50%;top:12%;transform:translateX(-50%);z-index:40;background:rgba(20,26,40,.95);border:1px solid rgba(245,196,81,.5);color:#f5e2b0;font-weight:800;font-size:14px;padding:9px 16px;border-radius:999px;opacity:0;transition:.3s;pointer-events:none}
  .toast.on{opacity:1}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top">
    <a class="home" href="index.html">← 허브</a>
    <div class="ti">🏆 서바이벌 <b>최후의 1인</b></div>
    <div class="sp"></div>
    <div class="alive" id="alive">🟢 20명 생존</div>
  </div>
  <div class="body">
    <div class="left">
      <div class="chartwrap"><canvas id="cv"></canvas></div>
      <div class="qbar"><div class="q" id="q">다음 흐름은? O(오른다) / X(내린다)</div><div class="timer" id="timer">12</div></div>
      <div class="oxrow">
        <div class="ox o" id="oxO"><div class="oxi">O</div><div class="oxt">오른다 ▲</div><div class="oxs">다음 흐름 상승</div></div>
        <div class="ox x" id="oxX"><div class="oxi">X</div><div class="oxt">내린다 ▼</div><div class="oxs">다음 흐름 하락</div></div>
      </div>
    </div>
    <div class="right">
      <div class="rhd">👥 참가자 <span id="rhc" style="margin-left:auto;color:var(--faint)">20명</span></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
  <div class="banner" id="banner"></div>
  <div class="toast" id="toast"></div>

  <!-- 매칭 -->
  <div class="ov on" id="match"><div class="mcard">
    <div class="mt">🏆 서바이벌 · <b>최후의 1인</b></div>
    <div class="msub">20명이 차트 O/X로 대결! 틀리면 즉시 탈락. 끝까지 살아남으면 우승 🎉</div>
    <div class="mcount" id="mcount">플레이어 모으는 중… 1 / 20</div>
    <div class="mgrid" id="mgrid"></div>
    <button class="mbtn" id="mbtn" disabled>대기 중…</button>
  </div></div>

  <!-- 결과 -->
  <div class="ov" id="result"><div class="rcard">
    <div class="rr" id="rRay">🎖️</div>
    <h2 id="rTitle">결과</h2>
    <div class="rp" id="rPlace"></div>
    <div class="rrew" id="rRew"></div>
    <div class="rbtns"><button class="again" id="rAgain">다시 도전 ▶</button><a class="hub" href="index.html">허브로</a></div>
  </div></div>
</div>

<script src="charts.js"></script>
<script src="energy.js"></script>
<script src="xp.js"></script>
<script>
(function(){
var $=function(id){return document.getElementById(id);};
var hub=(function(){try{return JSON.parse(localStorage.getItem('chartarena_hub_v1'))||{};}catch(e){return{};}})();
var myCh=(hub.equip&&hub.equip.ch)||'hu0';
var myUpg=(hub.owned&&hub.owned.upg)||[];
function charSrc(id){ if(String(id).indexOf('hu')===0){ if(myUpg.indexOf(id)>=0) return 'assets/hux'+id.replace('hu','')+'.png?v=2'; return 'assets/'+id+'.png?v=7'; } return 'assets/'+id+'.png'; }
var myNick=(hub.nick||'차트고수').slice(0,10);
function getBal(){try{var g=JSON.parse(localStorage.getItem('chartarena_web_v1'))||{};return typeof g.balance==='number'?g.balance:25000;}catch(e){return 25000;}}
function setBal(v){try{var g=JSON.parse(localStorage.getItem('chartarena_web_v1'))||{};g.balance=v;localStorage.setItem('chartarena_web_v1',JSON.stringify(g));}catch(e){}}
function addGems(n){try{var h=JSON.parse(localStorage.getItem('chartarena_hub_v1'))||{};h.gems=(h.gems|0)+(n|0);localStorage.setItem('chartarena_hub_v1',JSON.stringify(h));}catch(e){}}
function fmt(n){return (n|0).toLocaleString();}
var CHARTS=(window.CHARTS&&window.CHARTS.length)?window.CHARTS:[];
var BOTNAMES=['불꽃트레이더','존버킴','떡상요정','캔들마스터','코인고수','한강뷰맨','우상향러','물타기왕','단타여신','칼손절','추격매수','다이아손','고래잡이','풀매수러','익절만렙','반등각','평단내리기','로켓탑승','바닥줍줍','패닉셀러','스캘핑고수','존버여왕','불장러','추매요정','시드지킴','청산방지','매수각','존버박','겁쟁이킴','한탕주의'];
var N=20;
var players=[], round=0, phase='idle', tleft=12, tmr=null, CUR=null, revTimer=null;
var _bag=[];
function pickChart(){ if(!_bag.length){ _bag=CHARTS.map(function(_,i){return i;}); for(var i=_bag.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=_bag[i];_bag[i]=_bag[j];_bag[j]=t;} } var c=CHARTS[_bag.pop()]||CHARTS[0]; var vis=c.cs.length-30; var entry=c.cs[vis-1][3], exit=c.cs[c.cs.length-1][3]; return {cs:c.cs, vis:vis, sym:c.sym, tf:c.tf, ans:(exit>=entry?'O':'X'), move:((exit-entry)/entry*100)}; }

/* ---------- participants ---------- */
function buildPlayers(realNames){
  players=[]; players.push({name:myNick, img:charSrc(myCh), alive:true, pick:null, me:true});
  var huPool=[]; for(var i=0;i<17;i++){ if('hu'+i!==myCh) huPool.push('hu'+i); }
  for(i=huPool.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=huPool[i];huPool[i]=huPool[j];huPool[j]=t;}
  var nmBag=BOTNAMES.slice(); for(i=nmBag.length-1;i>0;i--){var j2=(Math.random()*(i+1))|0,t2=nmBag[i];nmBag[i]=nmBag[j2];nmBag[j2]=t2;}
  for(var b=1;b<N;b++){ players.push({name:nmBag[(b-1)%nmBag.length], img:'assets/'+huPool[(b-1)%huPool.length]+'.png?v=7', alive:true, pick:null, me:false}); }
}
function aliveCount(){ var c=0; for(var i=0;i<players.length;i++) if(players[i].alive) c++; return c; }
function meAlive(){ return players[0].alive; }

/* ---------- matching (실시간 사람 자리 + 봇 채우기) ---------- */
function startMatching(){
  buildPlayers();
  var mg=$('mgrid'); mg.innerHTML='';
  for(var i=0;i<N;i++){ var d=document.createElement('div'); d.className='ms'; d.innerHTML='<img src="'+players[i].img+'" alt="">'; mg.appendChild(d); }
  var slots=mg.querySelectorAll('.ms');
  slots[0].classList.add('on');   // 나
  var shown=1; $('mcount').textContent='플레이어 모으는 중… 1 / '+N;
  var iv=setInterval(function(){
    if(shown>=N){ clearInterval(iv); $('mcount').textContent='입장 완료! '+N+' / '+N; var mb=$('mbtn'); mb.disabled=false; mb.textContent='게임 시작 ▶'; return; }
    var add=1+((Math.random()*2)|0); for(var k=0;k<add&&shown<N;k++){ slots[shown].classList.add('on'); shown++; }
    $('mcount').textContent=(shown>=N?'입장 완료!':'플레이어 모으는 중…')+' '+shown+' / '+N;
  }, 160);
}
$('mbtn').onclick=function(){
  if(window.NRG && !NRG.use()){ $('mbtn').textContent='게임 횟수 부족 · 허브에서 충전'; $('mbtn').disabled=true; setTimeout(function(){location.href='index.html';},1400); return; }
  $('match').classList.remove('on'); renderGrid(); nextRound();
};

/* ---------- grid ---------- */
function renderGrid(){
  var g=$('grid'); g.innerHTML='';
  players.forEach(function(p,i){
    var pk = p.pick && (phase==='reveal'||phase==='result' || (p.me&&phase==='pick')) ? '<div class="pk '+p.pick+'">'+p.pick+'</div>' : '';
    var cls='pl'+(p.me?' me':'')+(p.alive?'':' dead')+((!p.alive&&p._winner)?'':'')+((aliveCount()===1&&p.alive)?' win':'');
    g.innerHTML+='<div class="'+cls+'">'+pk+'<img class="av" src="'+p.img+'" alt=""><div class="nm">'+(p.me?'나':p.name)+'</div></div>';
  });
  $('alive').innerHTML='🟢 '+aliveCount()+'명 생존 <span class="dead">/ '+N+'</span>';
  $('rhc').textContent=aliveCount()+' / '+N;
}

/* ---------- chart draw ---------- */
var cv=$('cv'), ctx=cv.getContext('2d'), revN=0;
function sizeCv(){ var r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1; cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); return {w:r.width,h:r.height}; }
function draw(){
  if(!CUR)return; var s=sizeCv(), W=s.w, H=s.h; ctx.clearRect(0,0,W,H);
  var cs=CUR.cs, vis=CUR.vis, showN=Math.min(cs.length, vis+revN);
  var start=Math.max(0, showN-64);                     // 최근 ~64봉
  var slice=cs.slice(start, showN);
  var lo=1e9, hi=-1e9; for(var i=0;i<slice.length;i++){ if(slice[i][2]<lo)lo=slice[i][2]; if(slice[i][1]>hi)hi=slice[i][1]; }
  var pad=(hi-lo)*0.08||1; lo-=pad; hi+=pad;
  var padL=6, padR=8, padT=8, padB=8, plotW=W-padL-padR, plotH=H-padT-padB;
  var n=slice.length, cw=plotW/n, bw=Math.max(1.5,cw*0.62);
  function yOf(v){ return padT+plotH-(v-lo)/(hi-lo)*plotH; }
  // 리빌 경계선(현재 시점)
  var vx=padL+(vis-start)*cw;
  if(vis>start && vis<showN){ ctx.strokeStyle='rgba(245,196,81,.5)'; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(vx,padT); ctx.lineTo(vx,padT+plotH); ctx.stroke(); ctx.setLineDash([]); }
  for(i=0;i<n;i++){ var c=slice[i], o=c[0],h2=c[1],l=c[2],cl=c[3]; var up=cl>=o; var col=up?'#F0616D':'#4C8DF6';
    var future=(start+i)>=vis; ctx.globalAlpha=future?1:0.9;
    var x=padL+i*cw+cw/2;
    ctx.strokeStyle=col; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,yOf(h2)); ctx.lineTo(x,yOf(l)); ctx.stroke();
    var yA=yOf(Math.max(o,cl)), yB=yOf(Math.min(o,cl)); ctx.fillStyle=col; ctx.fillRect(x-bw/2, yA, bw, Math.max(1,yB-yA));
  }
  ctx.globalAlpha=1;
}

/* ---------- round flow ---------- */
function nextRound(){
  if(!meAlive()){ endGame(false); return; }
  if(aliveCount()<=1){ endGame(true); return; }
  round++; phase='pick'; CUR=pickChart(); revN=0; tleft=12;
  players.forEach(function(p){ p.pick=null; });
  $('q').textContent='ROUND '+round+' · 다음 흐름은? ('+CUR.sym+' '+CUR.tf+')';
  $('oxO').className='ox o'; $('oxX').className='ox x';
  renderGrid(); draw();
  $('timer').textContent=tleft; $('timer').classList.remove('hot');
  clearInterval(tmr); tmr=setInterval(function(){ tleft--; $('timer').textContent=Math.max(0,tleft); if(tleft<=3)$('timer').classList.add('hot'); if(tleft<=0){ clearInterval(tmr); lockAndReveal(); } }, 1000);
}
function pick(d){ if(phase!=='pick')return; players[0].pick=d; $('oxO').classList.toggle('sel',d==='O'); $('oxX').classList.toggle('sel',d==='X'); renderGrid(); if(tleft>3){ tleft=3; $('timer').textContent=tleft; } }
$('oxO').onclick=function(){pick('O');}; $('oxX').onclick=function(){pick('X');};
document.addEventListener('keydown',function(e){ if(phase!=='pick')return; if(e.key==='o'||e.key==='O'||e.key==='ArrowUp')pick('O'); if(e.key==='x'||e.key==='X'||e.key==='ArrowDown')pick('X'); });

function lockAndReveal(){
  if(phase!=='pick')return; phase='reveal'; clearInterval(tmr);
  $('oxO').classList.add('disabled'); $('oxX').classList.add('disabled');
  // 봇 픽 (약간의 편향, ~52% 정답률 → 매 라운드 탈락 발생)
  players.forEach(function(p){ if(!p.alive||p.me)return; if(!p.pick){ var r=Math.random(); p.pick = r<0.52 ? CUR.ans : (CUR.ans==='O'?'X':'O'); } });
  renderGrid();
  // 미래 캔들 애니메이션 리빌
  var target=30; revTimer=setInterval(function(){ revN++; draw(); if(revN>=target){ clearInterval(revTimer); revealResult(); } }, 45);
}
function revealResult(){
  var ans=CUR.ans;
  $('oxO').classList.add(ans==='O'?'right':'wrong'); $('oxX').classList.add(ans==='X'?'right':'wrong');
  var bn=$('banner'); bn.className='banner '+(ans==='O'?'o':'x')+' show'; bn.textContent=(ans==='O'?'▲ 상승! (O)':'▼ 하락! (X)');
  // 탈락 처리
  var before=aliveCount();
  players.forEach(function(p){ if(p.alive && p.pick!==ans){ p.alive=false; } });
  var meJustDied = !players[0].alive;
  phase='result'; renderGrid();
  setTimeout(function(){ bn.classList.remove('show');
    if(!meJustDied && meAlive()) battleXp(true); // 살아남음 = +XP
    if(meJustDied){ battleXp(false); endGame(false); return; }
    if(aliveCount()<=1){ endGame(true); return; }
    // 잠깐 보여주고 다음 라운드
    toast('생존! '+aliveCount()+'명 남음');
    setTimeout(nextRound, 1100);
  }, 900);
}

/* ---------- XP (배틀 규칙: 생존 +10 / 탈락 -5, 100/레벨, 레벨업 보상) ---------- */
function battleXp(survived){ if(!window.XP)return; var amt=survived?10:-5; var res=XP.award(amt,'survival'); if(!res)return;
  if(res.leveledUp){ var lv=res.newLevel-res.oldLevel; setBal(getBal()+100000*lv); addGems(3*lv); XP.popup(res); } }

/* ---------- end ---------- */
function endGame(win){
  phase='idle'; clearInterval(tmr); if(revTimer)clearInterval(revTimer);
  var place = win ? 1 : aliveCount()+ (players[0].alive?0:1);   // 탈락 시 = 남은 생존자 + 나
  if(win){ players[0]._winner=true; renderGrid(); }
  // 보상
  var gold, gems;
  if(win){ gold=500000; gems=10; }
  else if(place<=3){ gold=200000; gems=5; }
  else if(place<=10){ gold=50000; gems=2; }
  else { gold=10000; gems=0; }
  setBal(getBal()+gold); if(gems)addGems(gems);
  $('rRay').textContent = win?'🏆':(place<=3?'🥈':(place<=10?'🎖️':'💧'));
  $('rTitle').textContent = win?'최후의 1인 우승!':(place+'위로 탈락');
  $('rPlace').textContent = win?'20명 중 끝까지 생존 🎉':(N+'명 중 '+place+'위');
  $('rRew').innerHTML = '보상 🪙 +'+fmt(gold)+' 골드'+(gems?' · 💎 +'+gems:'')+'<br><span style="color:#9fb0d0;font-size:12px">생존 라운드마다 경험치도 획득했어요</span>';
  $('result').classList.add('on');
}
$('rAgain').onclick=function(){ $('result').classList.remove('on'); round=0; players.forEach(function(p){p.alive=true;p.pick=null;p._winner=false;}); $('oxO').className='ox o';$('oxX').className='ox x'; $('match').classList.add('on'); startMatching(); };

function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('on'); setTimeout(function(){t.classList.remove('on');},1000); }

// init
window.addEventListener('resize',function(){ if(CUR)draw(); });
if(!CHARTS.length){ $('mcount').textContent='차트 데이터를 불러오지 못했어요'; }
else startMatching();
})();
</script>
