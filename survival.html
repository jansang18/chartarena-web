<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>차트아레나 · 서바이벌 최후의 1인</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b1020'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<style>
  :root{--bg:#0a0e1a;--p1:#111726;--p2:#0e1526;--line:#22304e;--txt:#e9eefc;--sub:#9fb0d0;--faint:#6b7a99;
    --up:#F0616D;--down:#4C8DF6;--green:#35D07A;--gold:#F5C451;--mono:ui-monospace,"Cascadia Mono",Consolas,monospace;
    --sans:"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:radial-gradient(120% 70% at 50% -10%,#16223f,#0a0e1a 55%);color:var(--txt);font-family:var(--sans);overflow:hidden}
  .app{width:min(100vw,calc(100vh*1120/640));aspect-ratio:1120/640;max-height:100vh;margin:0 auto;display:flex;flex-direction:column;position:relative}
  .top{display:flex;align-items:center;gap:10px;padding:11px 16px 6px}
  .top .home{text-decoration:none;color:var(--sub);font-size:12px;font-weight:700;background:var(--p1);border:1px solid var(--line);border-radius:9px;padding:6px 11px}
  .top .ti{font-weight:900;font-size:16px}.top .ti b{color:var(--gold)}
  .top .sp{flex:1}
  .alive{font-weight:900;font-family:var(--mono);font-size:15px;color:var(--green);background:rgba(53,208,122,.12);border:1px solid rgba(53,208,122,.4);border-radius:999px;padding:5px 13px}
  .alive .dead{color:var(--faint)}
  .body{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px;padding:2px 16px 12px}
  /* 차트 */
  .chartcol{height:41%;display:flex;flex-direction:column;gap:6px}
  .chartwrap{flex:1;min-height:0;position:relative;background:var(--p2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  canvas{width:100%;height:100%;display:block}
  .qbar{display:flex;align-items:center;gap:10px}
  .qbar .q{font-weight:900;font-size:15px}
  .qbar .undec{font-size:12px;color:var(--faint);font-weight:700}
  .qbar .timer{margin-left:auto;font-family:var(--mono);font-weight:900;font-size:22px;color:var(--gold)}
  .qbar .timer.hot{color:var(--up);animation:pulse .5s infinite alternate}
  @keyframes pulse{to{transform:scale(1.14)}}
  /* 두 구역 */
  .zones{flex:1;min-height:0;display:flex;gap:12px}
  .zone{flex:1;min-width:0;display:flex;flex-direction:column;border-radius:16px;border:2px solid;padding:10px 10px 8px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
  .zone.zo{border-color:rgba(240,97,109,.45);background:radial-gradient(120% 80% at 50% 0%,rgba(240,97,109,.14),rgba(240,97,109,.03))}
  .zone.zx{border-color:rgba(76,141,246,.45);background:radial-gradient(120% 80% at 50% 0%,rgba(76,141,246,.14),rgba(76,141,246,.03))}
  .zone.zo.sel{border-color:var(--up);box-shadow:inset 0 0 40px -12px var(--up),0 0 22px -8px var(--up)}
  .zone.zx.sel{border-color:var(--down);box-shadow:inset 0 0 40px -12px var(--down),0 0 22px -8px var(--down)}
  .zone.right{outline:3px solid var(--green);outline-offset:2px}
  .zone.wrong{outline:3px solid var(--up);outline-offset:2px}
  .zone.locked{cursor:default}
  .zhd{display:flex;align-items:center;gap:8px;font-weight:900;font-size:16px;flex:none;margin-bottom:6px}
  .zhd b{font-size:26px;line-height:1}
  .zone.zo .zhd b{color:var(--up)}.zone.zx .zhd b{color:var(--down)}
  .zhd .zc{margin-left:auto;font-family:var(--mono);font-size:15px}
  .zhd .hint{font-size:11px;color:var(--faint);font-weight:700}
  .zavs{flex:1;min-height:0;overflow-y:auto;display:flex;flex-wrap:wrap;align-content:flex-start;gap:5px 4px;padding:2px;scrollbar-width:thin}
  .zavs::-webkit-scrollbar{width:5px}.zavs::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .zav{width:44px;text-align:center;position:relative;animation:hop .28s cubic-bezier(.2,1.4,.4,1)}
  @keyframes hop{from{transform:translateY(16px) scale(.7);opacity:0}to{transform:none;opacity:1}}
  .zav img{width:40px;height:44px;object-fit:contain;object-position:bottom;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5))}
  .zav .zn{font-size:8px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
  .zav.me img{filter:drop-shadow(0 0 7px var(--gold))}
  .zav.me .zn{color:var(--gold);font-weight:800}
  .zav.fall{animation:fall .7s ease-in forwards}
  @keyframes fall{to{transform:translateY(120px) rotate(18deg);opacity:0}}
  /* 대기(미정) 스트립 */
  .waiting{flex:none;height:52px;display:flex;align-items:center;gap:4px;overflow-x:auto;padding:0 4px;scrollbar-width:none}
  .waiting::-webkit-scrollbar{display:none}
  .waiting .wl{font-size:11px;color:var(--faint);font-weight:700;flex:none;margin-right:4px}
  .waiting .zav{width:38px}.waiting .zav img{width:34px;height:38px}
  /* 오버레이(매칭/결과) */
  .ov{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(6,10,20,.92);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);text-align:center;padding:20px}
  .ov.on{display:flex}
  .mcard{width:min(92%,560px)}
  .mcard .mt{font-size:26px;font-weight:900}.mcard .mt b{color:var(--gold)}
  .mcard .msub{color:var(--sub);font-size:14px;margin-top:6px}
  .mcount{font-family:var(--mono);font-weight:900;font-size:20px;color:var(--green);margin:16px 0 10px}
  .mgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:8px}
  .mgrid .ms{aspect-ratio:1;border-radius:8px;background:#0c1424;border:1px solid #1c2a46;display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:.25;transition:.2s}
  .mgrid .ms.on{opacity:1;border-color:#2c3d61}
  .mgrid .ms img{width:100%;height:100%;object-fit:contain;object-position:bottom}
  .mbtn{margin-top:18px;border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:17px;color:#062018;background:linear-gradient(180deg,#48e58c,#25b061);border-radius:13px;padding:14px 30px}
  .mbtn:disabled{opacity:.5}
  .rcard{width:min(92%,420px);background:radial-gradient(120% 90% at 50% 0%,#1c2a4a,#0e1424 60%,#0a0e1a);border:1px solid rgba(245,196,81,.4);border-radius:22px;padding:28px 24px 22px}
  .rcard .rr{font-size:52px;line-height:1}
  .rcard h2{font-size:24px;font-weight:900;margin:6px 0 2px}
  .rcard .rp{font-family:var(--mono);font-size:17px;color:var(--gold);font-weight:900}
  .rcard .rrew{margin-top:14px;background:rgba(76,141,246,.1);border:1px solid rgba(76,141,246,.35);border-radius:12px;padding:11px;color:#cfe0ff;font-size:14px;font-weight:700}
  .rcard .rbtns{display:flex;gap:10px;margin-top:18px}
  .rcard .rbtns button,.rcard .rbtns a{flex:1;text-decoration:none;text-align:center;border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:15px;border-radius:12px;padding:13px}
  .rbtns .again{color:#062018;background:linear-gradient(180deg,#48e58c,#25b061)}
  .rbtns .hub{color:var(--sub);background:var(--p1);border:1px solid var(--line)!important}
  .banner{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);z-index:25;font-weight:900;font-size:42px;pointer-events:none;opacity:0;transition:.3s;text-shadow:0 6px 24px #000}
  .banner.show{opacity:1;transform:translate(-50%,-50%) scale(1.05)}
  .banner.o{color:var(--up)}.banner.x{color:var(--down)}
  .toast{position:absolute;left:50%;top:11%;transform:translateX(-50%);z-index:40;background:rgba(20,26,40,.95);border:1px solid rgba(245,196,81,.5);color:#f5e2b0;font-weight:800;font-size:14px;padding:8px 15px;border-radius:999px;opacity:0;transition:.3s;pointer-events:none}
  .toast.on{opacity:1}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top">
    <a class="home" href="index.html">← 허브</a>
    <div class="ti">🏆 서바이벌 <b>최후의 1인</b></div>
    <div class="sp"></div>
    <div class="alive" id="alive">🟢 20명 생존</div>
  </div>
  <div class="body">
    <div class="chartcol">
      <div class="chartwrap"><canvas id="cv"></canvas></div>
      <div class="qbar"><div class="q" id="q">다음 흐름은?</div><div class="undec" id="undec"></div><div class="timer" id="timer">12</div></div>
    </div>
    <div class="waiting" id="waiting"></div>
    <div class="zones">
      <div class="zone zo" id="zoneO"><div class="zhd"><b>O</b> 오른다 ▲ <span class="hint">클릭해서 이동</span><span class="zc" id="zcO">0</span></div><div class="zavs" id="zavO"></div></div>
      <div class="zone zx" id="zoneX"><div class="zhd"><b>X</b> 내린다 ▼ <span class="hint">클릭해서 이동</span><span class="zc" id="zcX">0</span></div><div class="zavs" id="zavX"></div></div>
    </div>
  </div>
  <div class="banner" id="banner"></div>
  <div class="toast" id="toast"></div>

  <div class="ov on" id="match"><div class="mcard">
    <div class="mt">🏆 서바이벌 · <b>최후의 1인</b></div>
    <div class="msub">20명이 O(오른다)·X(내린다) 구역으로 이동! 틀린 구역은 전원 탈락. 끝까지 살아남으면 우승 🎉</div>
    <div class="mcount" id="mcount">플레이어 모으는 중… 1 / 20</div>
    <div class="mgrid" id="mgrid"></div>
    <button class="mbtn" id="mbtn" type="button" disabled>대기 중…</button>
  </div></div>

  <div class="ov" id="result"><div class="rcard">
    <div class="rr" id="rRay">🎖️</div>
    <h2 id="rTitle">결과</h2>
    <div class="rp" id="rPlace"></div>
    <div class="rrew" id="rRew"></div>
    <div class="rbtns"><button class="again" id="rAgain" type="button">다시 도전 ▶</button><a class="hub" href="index.html">허브로</a></div>
  </div></div>
</div>

<script src="charts.js"></script>
<script src="energy.js"></script>
<script src="xp.js"></script>
<script>
(function(){
var $=function(id){return document.getElementById(id);};
var hub=(function(){try{return JSON.parse(localStorage.getItem('chartarena_hub_v1'))||{};}catch(e){return{};}})();
var myCh=(hub.equip&&hub.equip.ch)||'hu0', myUpg=(hub.owned&&hub.owned.upg)||[];
function charSrc(id){ if(String(id).indexOf('hu')===0){ if(myUpg.indexOf(id)>=0) return 'assets/hux'+id.replace('hu','')+'.png?v=2'; return 'assets/'+id+'.png?v=7'; } return 'assets/'+id+'.png'; }
var myNick=(hub.nick||'차트고수').slice(0,10);
function getBal(){try{var g=JSON.parse(localStorage.getItem('chartarena_web_v1'))||{};return typeof g.balance==='number'?g.balance:25000;}catch(e){return 25000;}}
function setBal(v){try{var g=JSON.parse(localStorage.getItem('chartarena_web_v1'))||{};g.balance=v;localStorage.setItem('chartarena_web_v1',JSON.stringify(g));}catch(e){}}
function addGems(n){try{var h=JSON.parse(localStorage.getItem('chartarena_hub_v1'))||{};h.gems=(h.gems|0)+(n|0);localStorage.setItem('chartarena_hub_v1',JSON.stringify(h));}catch(e){}}
function fmt(n){return (n|0).toLocaleString();}
var CHARTS=(window.CHARTS&&window.CHARTS.length)?window.CHARTS:[];
var BOTNAMES=['불꽃트레이더','존버킴','떡상요정','캔들마스터','코인고수','한강뷰맨','우상향러','물타기왕','단타여신','칼손절','추격매수','다이아손','고래잡이','풀매수러','익절만렙','반등각','평단내리기','로켓탑승','바닥줍줍','패닉셀러','스캘핑고수','존버여왕','불장러','추매요정','시드지킴','청산방지','매수각','존버박','겁쟁이킴','한탕주의'];
var N=20;
var players=[], round=0, phase='idle', tleft=12, tmr=null, CUR=null, revTimer=null, botTimer=null;
var _bag=[];
function pickChart(){ if(!_bag.length){ _bag=CHARTS.map(function(_,i){return i;}); for(var i=_bag.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=_bag[i];_bag[i]=_bag[j];_bag[j]=t;} } var c=CHARTS[_bag.pop()]||CHARTS[0]; var vis=c.cs.length-30; var entry=c.cs[vis-1][3], exit=c.cs[c.cs.length-1][3]; return {cs:c.cs, vis:vis, sym:c.sym, tf:c.tf, ans:(exit>=entry?'O':'X')}; }

function buildPlayers(){
  players=[]; players.push({name:myNick, img:charSrc(myCh), alive:true, pick:null, me:true});
  var huPool=[]; for(var i=0;i<17;i++){ if('hu'+i!==myCh) huPool.push('hu'+i); }
  for(i=huPool.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=huPool[i];huPool[i]=huPool[j];huPool[j]=t;}
  var nmBag=BOTNAMES.slice(); for(i=nmBag.length-1;i>0;i--){var j2=(Math.random()*(i+1))|0,t2=nmBag[i];nmBag[i]=nmBag[j2];nmBag[j2]=t2;}
  for(var b=1;b<N;b++){ players.push({name:nmBag[(b-1)%nmBag.length], img:'assets/'+huPool[(b-1)%huPool.length]+'.png?v=7', alive:true, pick:null, me:false}); }
}
function aliveCount(){ var c=0; for(var i=0;i<players.length;i++) if(players[i].alive) c++; return c; }
function meAlive(){ return players[0].alive; }

/* 매칭 */
function startMatching(){
  buildPlayers();
  var mg=$('mgrid'); mg.innerHTML='';
  for(var i=0;i<N;i++){ var d=document.createElement('div'); d.className='ms'; d.innerHTML='<img src="'+players[i].img+'" alt="">'; mg.appendChild(d); }
  var slots=mg.querySelectorAll('.ms'); slots[0].classList.add('on');
  var shown=1; $('mcount').textContent='플레이어 모으는 중… 1 / '+N;
  var iv=setInterval(function(){
    if(shown>=N){ clearInterval(iv); $('mcount').textContent='입장 완료! '+N+' / '+N; var mb=$('mbtn'); mb.disabled=false; mb.textContent='게임 시작 ▶'; return; }
    var add=1+((Math.random()*2)|0); for(var k=0;k<add&&shown<N;k++){ slots[shown].classList.add('on'); shown++; }
    $('mcount').textContent=(shown>=N?'입장 완료!':'플레이어 모으는 중…')+' '+shown+' / '+N;
  }, 150);
}
$('mbtn').onclick=function(){
  if(window.NRG && !NRG.use()){ this.textContent='게임 횟수 부족 · 허브에서 충전'; this.disabled=true; setTimeout(function(){location.href='index.html';},1400); return; }
  $('match').classList.remove('on'); nextRound();
};

/* 아바타 렌더 (대기 스트립 + 두 구역) */
function avHTML(p,i){ return '<div class="zav'+(p.me?' me':'')+'" data-i="'+i+'"><img src="'+p.img+'" alt=""><div class="zn">'+(p.me?'나':p.name)+'</div></div>'; }
function renderZones(){
  var wait=[], zo=[], zx=[];
  players.forEach(function(p,i){ if(!p.alive)return; if(p.pick==='O')zo.push(avHTML(p,i)); else if(p.pick==='X')zx.push(avHTML(p,i)); else wait.push(avHTML(p,i)); });
  $('zavO').innerHTML=zo.join(''); $('zavX').innerHTML=zx.join('');
  $('zcO').textContent=zo.length; $('zcX').textContent=zx.length;
  $('waiting').innerHTML=(wait.length?'<span class="wl">아직 안 정한 '+wait.length+'명</span>':'')+wait.join('');
  var un=wait.length; $('undec').textContent=un?('미정 '+un+'명'):'';
  $('alive').innerHTML='🟢 '+aliveCount()+'명 생존 <span class="dead">/ '+N+'</span>';
}

/* 차트 */
var cv=$('cv'), ctx=cv.getContext('2d'), revN=0;
function sizeCv(){ var r=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1; cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); return {w:r.width,h:r.height}; }
function draw(){
  if(!CUR)return; var s=sizeCv(), W=s.w, H=s.h; ctx.clearRect(0,0,W,H);
  var cs=CUR.cs, vis=CUR.vis, showN=Math.min(cs.length, vis+revN);
  var start=Math.max(0, showN-64), slice=cs.slice(start, showN);
  var lo=1e9, hi=-1e9; for(var i=0;i<slice.length;i++){ if(slice[i][2]<lo)lo=slice[i][2]; if(slice[i][1]>hi)hi=slice[i][1]; }
  var pad=(hi-lo)*0.08||1; lo-=pad; hi+=pad;
  var padL=6, padR=8, padT=8, padB=8, plotW=W-padL-padR, plotH=H-padT-padB;
  var n=slice.length, cw=plotW/n, bw=Math.max(1.5,cw*0.62);
  function yOf(v){ return padT+plotH-(v-lo)/(hi-lo)*plotH; }
  var vx=padL+(vis-start)*cw;
  if(vis>start && vis<showN){ ctx.strokeStyle='rgba(245,196,81,.5)'; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(vx,padT); ctx.lineTo(vx,padT+plotH); ctx.stroke(); ctx.setLineDash([]); }
  for(i=0;i<n;i++){ var c=slice[i], o=c[0],h2=c[1],l=c[2],cl=c[3]; var up=cl>=o, col=up?'#F0616D':'#4C8DF6';
    var x=padL+i*cw+cw/2;
    ctx.strokeStyle=col; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,yOf(h2)); ctx.lineTo(x,yOf(l)); ctx.stroke();
    var yA=yOf(Math.max(o,cl)), yB=yOf(Math.min(o,cl)); ctx.fillStyle=col; ctx.fillRect(x-bw/2, yA, bw, Math.max(1,yB-yA)); }
}

/* 라운드 */
function nextRound(){
  if(!meAlive()){ endGame(false); return; }
  if(aliveCount()<=1){ endGame(true); return; }
  round++; phase='pick'; CUR=pickChart(); revN=0; tleft=12;
  players.forEach(function(p){ p.pick=null; });
  $('q').textContent='ROUND '+round+' · 다음 흐름은? ('+CUR.sym+' '+CUR.tf+')';
  $('zoneO').className='zone zo'; $('zoneX').className='zone zx';
  renderZones(); draw();
  $('timer').textContent=tleft; $('timer').classList.remove('hot');
  clearInterval(tmr); tmr=setInterval(function(){ tleft--; $('timer').textContent=Math.max(0,tleft); if(tleft<=3)$('timer').classList.add('hot'); if(tleft<=0){ clearInterval(tmr); lockAndReveal(); } }, 1000);
  // 봇 점진적 이동 (긴장감): 매 400~700ms 몇 명씩 구역 선택
  clearInterval(botTimer);
  botTimer=setInterval(function(){ if(phase!=='pick'){clearInterval(botTimer);return;}
    var un=players.filter(function(p){return p.alive&&!p.me&&!p.pick;});
    if(!un.length){ clearInterval(botTimer); return; }
    var mv=1+((Math.random()*3)|0);
    for(var k=0;k<mv&&un.length;k++){ var idx=(Math.random()*un.length)|0; var p=un.splice(idx,1)[0]; p.pick = Math.random()<0.52 ? CUR.ans : (CUR.ans==='O'?'X':'O'); }
    renderZones();
  }, 520);
}
function pick(d){ if(phase!=='pick')return; players[0].pick=d;
  $('zoneO').classList.toggle('sel',d==='O'); $('zoneX').classList.toggle('sel',d==='X');
  renderZones(); if(tleft>3){ tleft=3; $('timer').textContent=tleft; } }
$('zoneO').onclick=function(){pick('O');}; $('zoneX').onclick=function(){pick('X');};
document.addEventListener('keydown',function(e){ if(phase!=='pick')return; if(e.key==='o'||e.key==='O'||e.key==='ArrowLeft')pick('O'); if(e.key==='x'||e.key==='X'||e.key==='ArrowRight')pick('X'); });

function lockAndReveal(){
  if(phase!=='pick')return; phase='reveal'; clearInterval(tmr); clearInterval(botTimer);
  $('zoneO').classList.add('locked'); $('zoneX').classList.add('locked');
  // 남은 미정자 강제 배정 (봇=랜덤, 나=미정이면 그대로 → 탈락)
  players.forEach(function(p){ if(!p.alive||p.pick)return; if(!p.me){ p.pick=Math.random()<0.5?'O':'X'; } });
  renderZones();
  revTimer=setInterval(function(){ revN++; draw(); if(revN>=30){ clearInterval(revTimer); revealResult(); } }, 45);
}
function revealResult(){
  var ans=CUR.ans, wrongZ=(ans==='O'?'zoneX':'zoneO');
  $(ans==='O'?'zoneO':'zoneX').classList.add('right'); $(wrongZ).classList.add('wrong');
  var bn=$('banner'); bn.className='banner '+(ans==='O'?'o':'x')+' show'; bn.textContent=(ans==='O'?'▲ 상승! O 정답':'▼ 하락! X 정답');
  // 틀린 구역 아바타 낙하 애니메이션
  var wrongAvs=$(wrongZ==='zoneO'?'zavO':'zavX').querySelectorAll('.zav');
  wrongAvs.forEach(function(el,k){ setTimeout(function(){ el.classList.add('fall'); }, k*35); });
  var meJustDied=false;
  players.forEach(function(p){ if(p.alive && p.pick!==ans){ p.alive=false; if(p.me)meJustDied=true; } });
  phase='result';
  setTimeout(function(){ bn.classList.remove('show'); renderZones();
    if(meJustDied){ battleXp(false); endGame(false); return; }
    battleXp(true);
    if(aliveCount()<=1){ endGame(true); return; }
    toast('생존! '+aliveCount()+'명 남음');
    setTimeout(nextRound, 1000);
  }, 1050);
}

function battleXp(survived){ if(!window.XP)return; var res=XP.award(survived?10:-5,'survival'); if(!res)return;
  if(res.leveledUp){ var lv=res.newLevel-res.oldLevel; setBal(getBal()+100000*lv); addGems(3*lv); XP.popup(res); } }

function endGame(win){
  phase='idle'; clearInterval(tmr); clearInterval(botTimer); if(revTimer)clearInterval(revTimer);
  var place = win ? 1 : aliveCount()+ (players[0].alive?0:1);
  var gold, gems;
  if(win){ gold=500000; gems=10; } else if(place<=3){ gold=200000; gems=5; } else if(place<=10){ gold=50000; gems=2; } else { gold=10000; gems=0; }
  setBal(getBal()+gold); if(gems)addGems(gems);
  $('rRay').textContent = win?'🏆':(place<=3?'🥈':(place<=10?'🎖️':'💧'));
  $('rTitle').textContent = win?'최후의 1인 우승!':(place+'위로 탈락');
  $('rPlace').textContent = win?'20명 중 끝까지 생존 🎉':(N+'명 중 '+place+'위');
  $('rRew').innerHTML = '보상 🪙 +'+fmt(gold)+' 골드'+(gems?' · 💎 +'+gems:'')+'<br><span style="color:#9fb0d0;font-size:12px">생존 라운드마다 경험치도 획득했어요</span>';
  $('result').classList.add('on');
}
$('rAgain').onclick=function(){ $('result').classList.remove('on'); round=0; players.forEach(function(p){p.alive=true;p.pick=null;}); $('zoneO').className='zone zo';$('zoneX').className='zone zx'; $('match').classList.add('on'); startMatching(); };
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('on'); setTimeout(function(){t.classList.remove('on');},1000); }

window.addEventListener('resize',function(){ if(CUR)draw(); });
if(!CHARTS.length){ $('mcount').textContent='차트 데이터를 불러오지 못했어요'; } else startMatching();
})();
</script>
</body>
</html>
